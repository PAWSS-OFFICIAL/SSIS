/* ════════════════════ CONTENT ════════════════════ */
const LESSONS = [
{
  title:"Importing Modules",
  starter:'# A module is a file of ready-made code you can import\nimport math\n\nprint(math.sqrt(16))   # 4.0\nprint(math.pi)         # 3.141592653589793\n\n# import just the parts you need\nfrom random import randint\nprint(randint(1, 6))   # a dice roll between 1 and 6\n',
  html:`
<p>You do not have to write everything from scratch. A <strong>module</strong> is a file of ready-made Python code — functions, classes and values — that someone else has already written. <strong>Importing</strong> a module makes all of that available in your own program. Python ships with hundreds of them.</p>

<h2>Importing a whole module</h2>
<p>The simplest form is <code>import name</code>. After that, you reach the module's contents through the module name and a dot.</p>
<pre class="code">import math

print(math.sqrt(25))   # 5.0
print(math.pi)         # 3.141592653589793</pre>
<p>The dot means "look inside this module". <code>math.sqrt</code> reads as "the sqrt function that lives in math". This keeps names tidy: your own <code>pi</code> and the module's <code>math.pi</code> never clash.</p>

<h2>Importing specific names</h2>
<p>If you only need one or two things, <code>from module import name</code> brings just those in, so you can use them without the module prefix.</p>
<pre class="code">from math import sqrt, pi

print(sqrt(25))   # 5.0  — no "math." needed now
print(pi)         # 3.141592653589793</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Avoid <code>from math import *</code>, which pulls in <em>everything</em>. It can quietly overwrite your own variables with names you did not expect, making bugs hard to trace. Import only what you need, by name.</p></div>

<h2>Renaming with as</h2>
<p><code>as</code> gives an import a shorter alias. This is a convention for some popular libraries, and handy when a name is long.</p>
<pre class="code">import math as m

print(m.floor(3.7))   # 3
print(m.ceil(3.2))    # 4</pre>
<div class="callout note"><span class="lbl">Note</span><p>Python runs a module's code the first time it is imported, then remembers it. Importing the same module again in the same program does not run it a second time — it reuses what is already loaded.</p></div>
`
},
{
  title:"The Standard Library",
  starter:'import random\nimport datetime\n\n# random: pick numbers and choices\nprint(random.randint(1, 100))\nprint(random.choice(["red", "green", "blue"]))\n\n# datetime: work with dates and times\ntoday = datetime.date.today()\nprint(today)\n',
  html:`
<p>Everything that comes built into Python is called the <strong>standard library</strong> — the "batteries included" set of modules you can import without installing anything. Here are three you will reach for constantly.</p>

<h2>math: numbers beyond the basics</h2>
<p>The <code>math</code> module adds functions and constants that the plain operators do not cover.</p>
<pre class="code">import math

print(math.sqrt(81))    # 9.0   (square root)
print(math.floor(4.7))  # 4     (round down)
print(math.ceil(4.2))   # 5     (round up)
print(math.pi)          # 3.141592653589793
print(math.pow(2, 10))  # 1024.0</pre>

<h2>random: choosing and shuffling</h2>
<p>The <code>random</code> module produces random numbers and makes random choices — the basis of games, sampling and simulations.</p>
<table>
<tr><th>Function</th><th>What it does</th></tr>
<tr><td><code>random.randint(a, b)</code></td><td>whole number from a to b, both included</td></tr>
<tr><td><code>random.random()</code></td><td>a float between 0.0 and 1.0</td></tr>
<tr><td><code>random.choice(seq)</code></td><td>one random item from a sequence</td></tr>
<tr><td><code>random.shuffle(list)</code></td><td>reorder a list in place</td></tr>
</table>
<pre class="code">import random

print(random.randint(1, 6))                 # a dice roll
print(random.choice(["heads", "tails"]))    # a coin flip

deck = [1, 2, 3, 4, 5]
random.shuffle(deck)
print(deck)                                 # e.g. [3, 1, 5, 2, 4]</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p><code>randint(1, 6)</code> <strong>includes</strong> both ends, so it can return 1, 2, 3, 4, 5 or 6. This is different from <code>range</code>, which excludes the stop. Do not assume they behave the same.</p></div>

<h2>datetime: dates and times</h2>
<p>The <code>datetime</code> module represents dates and times as objects you can compare and do arithmetic with.</p>
<pre class="code">import datetime

today = datetime.date.today()
print(today)          # e.g. 2026-07-01
print(today.year)     # 2026

birthday = datetime.date(2000, 5, 20)
age_days = today - birthday      # subtracting dates gives a duration
print(age_days.days)             # the number of days between them</pre>
<div class="callout note"><span class="lbl">Note</span><p>Subtracting one date from another gives a <code>timedelta</code> — an object representing a span of time. Reading its <code>.days</code> attribute is how you turn that span into a plain number of days.</p></div>
`
},
{
  title:"Writing Your Own Modules",
  starter:'# Any .py file is a module you can import.\n# Suppose a file called helpers.py contains:\n#\n#     def greet(name):\n#         return f"Hello, {name}"\n#\n#     PI = 3.14159\n#\n# Another file can then use it:\n#\n#     import helpers\n#     print(helpers.greet("Alex"))   # Hello, Alex\n#     print(helpers.PI)              # 3.14159\n\nprint("A module is just a .py file you import")\n',
  html:`
<p>Modules are not magic — <strong>every Python file is a module</strong>. When your program grows past a single file, you split related code into your own <code>.py</code> files and import them, exactly as you import <code>math</code>. This keeps each file focused and reusable.</p>

<h2>Making a module</h2>
<p>Say you write a file named <code>helpers.py</code> containing some functions and values.</p>
<pre class="code"># helpers.py
def greet(name):
    return f"Hello, {name}"

def add(a, b):
    return a + b

PI = 3.14159</pre>
<p>From another file <em>in the same folder</em>, you import it by its file name without the <code>.py</code>, then use its contents with a dot.</p>
<pre class="code"># main.py
import helpers

print(helpers.greet("Alex"))   # Hello, Alex
print(helpers.add(2, 3))       # 5
print(helpers.PI)              # 3.14159</pre>
<div class="callout note"><span class="lbl">Note</span><p>The import name is the file name. A file called <code>student_tools.py</code> is imported as <code>import student_tools</code>. Keep module file names short, lowercase, and free of spaces or hyphens.</p></div>

<h2>Guarding code with __name__</h2>
<p>When Python imports a file, it <strong>runs</strong> the whole file. That is a problem if your module has test lines at the bottom — they would run on every import. The fix is a special check using the built-in <code>__name__</code>.</p>
<pre class="code"># helpers.py
def greet(name):
    return f"Hello, {name}"

if __name__ == "__main__":
    # this block runs ONLY when helpers.py is run directly,
    # never when it is imported by another file
    print(greet("test"))</pre>
<div class="callout note"><span class="lbl">Note</span><p>When a file is run directly, Python sets its <code>__name__</code> to <code>"__main__"</code>. When the same file is imported, <code>__name__</code> is the module's name instead. The <code>if __name__ == "__main__":</code> block is how you keep quick tests out of the way of imports.</p></div>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Putting loose <code>print</code> or input lines at the top level of a module. They run every time the module is imported, producing surprise output. Wrap anything that should only run on direct execution in the <code>__name__</code> guard.</p></div>
`
},
{
  title:"Packages & pip",
  starter:'# The standard library is built in. Everything else is installed with pip.\n#\n# In a terminal (not inside Python):\n#     pip install requests\n#\n# Then in your code:\n#     import requests\n#     response = requests.get("https://example.com")\n#     print(response.status_code)\n\nprint("pip installs third-party packages from PyPI")\n',
  html:`
<p>The standard library covers a lot, but not everything. A <strong>package</strong> is a bundle of modules that someone has published for others to use. The tool that downloads and installs them is <strong>pip</strong>, and the giant public store it fetches from is called <strong>PyPI</strong>, the Python Package Index.</p>

<h2>What a package is</h2>
<p>A single module is one file. A <strong>package</strong> is a folder of modules grouped together under one name, so you can install a whole toolkit at once. From your side, using one looks just like using any module: you <code>import</code> it.</p>

<h2>Installing with pip</h2>
<p>You run <code>pip</code> in your computer's terminal or command prompt — <strong>not</strong> inside the Python program itself. Each command installs a package from PyPI.</p>
<pre class="code"># run these in a terminal, not in Python
pip install requests      # install a package
pip install pandas        # install another
pip list                  # see what is installed
pip uninstall requests    # remove one</pre>
<p>Once installed, the package is available to import in your code like anything else.</p>
<pre class="code">import requests   # this only works after: pip install requests

response = requests.get("https://example.com")
print(response.status_code)   # 200 if the request succeeded</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Typing <code>pip install ...</code> <em>inside</em> the Python prompt gives a <code>SyntaxError</code>. Pip commands belong in the operating system's terminal. Inside Python, you only ever <code>import</code> the package after it has been installed.</p></div>

<h2>Standard library or package?</h2>
<table>
<tr><th>Standard library</th><th>Third-party package</th></tr>
<tr><td>built into Python</td><td>published by others on PyPI</td></tr>
<tr><td>no installation needed</td><td>installed with <code>pip install</code></td></tr>
<tr><td><code>math</code>, <code>random</code>, <code>json</code>, <code>datetime</code></td><td><code>requests</code>, <code>pandas</code>, <code>numpy</code></td></tr>
</table>
<div class="callout tip"><span class="lbl">Tip</span><p>Before installing a package for a task, check the standard library first — the job may already be covered by a built-in module, with nothing to install and nothing to keep up to date.</p></div>
`
}
];

/* ════════════════════ SYNTAX HIGHLIGHTER ════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(code){
  code = esc(code);
  const store=[];
  code = code.replace(/#[^\n]*/g, m=>{store.push('<span class="c">'+m+'</span>');return '\u0000';});
  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m=>{store.push('<span class="s">'+m+'</span>');return '\u0000';});
  code = code.replace(/\b\d+\.?\d*\b/g, '<span class="n">$&</span>');
  const kw=['def','return','if','elif','else','for','while','in','and','or','not','is','print','True','False','None','import','from','as','class','with','break','continue','pass','lambda','input','range','len','str','int','float'];
  code = code.replace(new RegExp('\\b('+kw.join('|')+')\\b','g'), '<span class="k">$1</span>');
  let k=0; code = code.replace(/\u0000/g, ()=>store[k++]);
  return code;
}

/* ════════════════════ STATE + RENDER ════════════════════ */
const flat=[{type:"lesson",i:0},{type:"lesson",i:1},{type:"lesson",i:2},{type:"lesson",i:3},{type:"tasks"}];
let cur=0, tab='lesson';

function buildNav(filter=""){
  const f=filter.trim().toLowerCase();
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(sec=>{
    const wrap=document.createElement('div'); wrap.className='nav-section';
    const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=sec.label; wrap.appendChild(lbl);
    let shown=0;
    sec.items.forEach(it=>{
      if(f && !it.label.toLowerCase().includes(f)) return;
      shown++;
      const el=document.createElement('div');
      el.className='nav-item'+(it.type==='tasks'?' task':'')+(sec.locked?' locked':'');
      const isActive = !sec.locked && ((it.type==='lesson'&&flat[cur].type==='lesson'&&flat[cur].i===it.i)||(it.type==='tasks'&&flat[cur].type==='tasks'));
      if(isActive) el.classList.add('active');
      let inner = it.type==='tasks'
        ? '<span class="file-ic">📄</span>'+it.label+'<span class="count">'+it.count+'</span>'
        : '<span class="dot"></span>'+it.label;
      if(sec.locked) inner += '<span class="count" style="margin-left:auto">🔒</span>';
      el.innerHTML=inner;
      if(!sec.locked){
        el.onclick=()=>{
          cur = it.type==='tasks' ? flat.length-1 : it.i;
          tab='lesson'; render();
        };
      } else { el.title='Available in the full Part 1 build'; }
      wrap.appendChild(el);
    });
    if(shown>0) nav.appendChild(wrap);
  });
}

function render(){
  const item=flat[cur];
  const lessonView=document.getElementById('lesson-view');
  const ideView=document.getElementById('ide-view');

  if(item.type==='lesson'){
    const L=LESSONS[item.i];
    document.getElementById('crumb').textContent='10. Modules & Standard Library';
    document.getElementById('title').textContent=L.title;
    lessonView.innerHTML=L.html;
    document.getElementById('editor').value=L.starter;
    document.getElementById('tab-ide').style.display='';
  } else {
    document.getElementById('crumb').textContent='10. Modules & Standard Library';
    document.getElementById('title').textContent='Module 1 Tasks';
    lessonView.innerHTML=renderTasks();
    document.getElementById('editor').value='# Use this editor to solve any task above.\n# Type your code, then press Run code.\n\n';
    document.getElementById('tab-ide').style.display='';
  }

  // highlight static lesson code blocks
  lessonView.querySelectorAll('pre.code').forEach(pre=>{ pre.innerHTML='<code>'+highlight(pre.textContent)+'</code>'; });

  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  lessonView.style.display = tab==='lesson' ? 'block' : 'none';
  ideView.classList.toggle('show', tab==='ide');
  updateGutter();

  // arrows
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===flat.length-1;

  buildNav(document.getElementById('search').value);
  document.querySelector('.content-wrap').scrollTop=0;
}

function renderTasks(){
  let h='<p class="tasks-intro">Work through these in order — they start very simple and build up. Try each one in the <strong>Try it yourself</strong> tab before revealing the solution.</p>';
  TASKS.forEach((t,idx)=>{
    h+='<div class="task"><div class="task-head"><div class="task-num">'+(idx+1)+'</div><div class="task-text">'+t.p+'</div></div>'+
       '<details><summary><span class="chev">▸</span> Show solution</summary><div class="task-sol">'+
       '<pre class="code"><code>'+highlight(t.c)+'</code></pre><div class="sol-note">'+t.e+'</div></div></details></div>';
  });
  return h;
}

/* ════════════════════ EDITOR ════════════════════ */
function updateGutter(){
  const ed=document.getElementById('editor');
  const lines=ed.value.split('\n').length;
  let g=''; for(let i=1;i<=lines;i++) g+=i+'\n';
  document.getElementById('gutter').textContent=g.trim();
}
const editor=document.getElementById('editor');
editor.addEventListener('input',updateGutter);
editor.addEventListener('scroll',()=>{document.getElementById('gutter').scrollTop=editor.scrollTop;});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateGutter();
  }
});

/* ════════════════════ RUN (Skulpt) ════════════════════ */
function runCode(){
  const out=document.getElementById('output');
  if(typeof Sk==='undefined'){
    out.innerHTML='<span class="out-hint">▸ The Python engine is still loading. Give it a moment and try again.</span>';
    return;
  }
  const code=document.getElementById('editor').value;
  out.innerHTML=''; let buf='';
  const write=t=>{buf+=t; out.innerHTML='<span class="out-ok">'+esc(buf)+'</span>'; out.scrollTop=out.scrollHeight;};
  const readf=x=>{ if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined) throw "File not found: '"+x+"'"; return Sk.builtinFiles["files"][x]; };
  Sk.configure({output:write, read:readf, __future__:Sk.python3, execLimit:10000});
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{ if(!buf) out.innerHTML='<span class="out-hint">▸ Program finished with no output.</span>'; },
          err=>{ out.innerHTML='<span class="out-err">'+esc(err.toString())+'</span>'; });
}
document.getElementById('run').onclick=runCode;
document.getElementById('reset').onclick=()=>{
  const item=flat[cur];
  document.getElementById('editor').value = item.type==='lesson' ? LESSONS[item.i].starter : '# Use this editor to solve any task above.\n\n';
  document.getElementById('output').innerHTML='<span class="out-hint">▸ Code reset.</span>';
  updateGutter();
};

/* ════════════════════ WIRING ════════════════════ */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ tab=t.dataset.tab; render(); });
document.getElementById('prev').onclick=()=>{ if(cur>0){cur--;tab='lesson';render();} };
document.getElementById('next').onclick=()=>{ if(cur<flat.length-1){cur++;tab='lesson';render();} };

buildNav();
render();
