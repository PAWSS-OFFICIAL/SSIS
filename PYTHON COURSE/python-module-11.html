  --muted:#6b7385;

  --navy:#1d3557;
  --plum:#83374e;
  --crimson:#e53e4e;
  --accent:#e53e4e;
  --accent-2:#e53e4e;
  --amber:#c97a12;
  --green:#1f8f5f;
  --info:#3563b0;
  --kw:#3355c8;
  --str:#1f8f5f;
  --num:#b5610a;
  --com:#7c8494;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'IBM Plex Sans',-apple-system,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d3d7e0;border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:#bcc1cc}
::-webkit-scrollbar-track{background:transparent}

/* ───────── TOP BAR ───────── */
.topbar{
  height:64px;flex:0 0 64px;
  display:flex;align-items:center;gap:18px;
  padding:0 22px;
  background:linear-gradient(90deg,var(--navy) 0%,var(--plum) 55%,var(--crimson) 100%);
  border-bottom:1px solid rgba(0,0,0,.22);
  z-index:10;
}
.brand{display:flex;align-items:center;gap:12px}
.logo-pill{
  background:#fff;border-radius:999px;
  padding:6px 14px 7px;
  display:flex;align-items:center;line-height:1;
  font-weight:800;font-size:15px;letter-spacing:-.2px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.logo-cadet{color:var(--navy)}
.logo-x{color:var(--crimson)}
.brand-name{font-weight:700;font-size:16px;letter-spacing:.2px;color:#fff}
.brand-sub{color:rgba(255,255,255,.72);font-size:13px}
.pill{
  font-size:11.5px;font-weight:600;letter-spacing:.4px;
  padding:5px 11px;border-radius:20px;white-space:nowrap;
}
.pill-part{
  background:rgba(255,255,255,.16);
  color:#fff;border:1px solid rgba(255,255,255,.3);
}
.pill-py{
  margin-left:auto;
  background:rgba(255,255,255,.14);
  color:#fff;border:1px solid rgba(255,255,255,.32);
}

/* ───────── LAYOUT ───────── */
.layout{flex:1;display:flex;min-height:0}

/* ───────── SIDEBAR ───────── */
.sidebar{
  width:300px;flex:0 0 300px;
  background:var(--bg-2);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:14px 12px 40px;
}
.search{
  position:relative;margin:4px 4px 16px;
}
.search input{
  width:100%;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:9px;
  color:var(--text);
  font-family:inherit;font-size:13px;
  padding:9px 12px 9px 34px;
  outline:none;
}
.search input::placeholder{color:var(--muted-2)}
.search input:focus{border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(229,62,78,.15)}
.search svg{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;stroke:var(--muted);fill:none;
}
.nav-section{margin-bottom:6px}
.nav-label{
  font-size:11px;font-weight:600;letter-spacing:.6px;
  color:var(--muted-2);text-transform:uppercase;
  padding:14px 12px 8px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:8px;
  font-size:13.5px;color:var(--muted);
  cursor:pointer;user-select:none;
  border-left:2px solid transparent;

}
.nav-item:hover{color:var(--text-2);background:rgba(20,25,40,.035)}
.nav-item .dot{
  width:6px;height:6px;border-radius:50%;

}

}
.nav-item.active .dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}

}

  color:#aeb6c9;line-height:1.55;white-space:pre-wrap;

<script>
/* ════════════════════ CONTENT ════════════════════ */
const LESSONS = [
{
  title:"Comprehensions in Depth",
  starter:'# A list comprehension builds a list in one readable line\nsquares = [n * n for n in range(1, 6)]\nprint(squares)          # [1, 4, 9, 16, 25]\n\n# with a condition, you can filter as you build\nevens = [n for n in range(1, 11) if n % 2 == 0]\nprint(evens)            # [2, 4, 6, 8, 10]\n',
  html:`
<p>You met list comprehensions briefly in Module 6. They are worth a proper look, because they are one of the most distinctive and useful features of Python. A <strong>comprehension</strong> builds a whole collection in a single expression, replacing a loop that appends to a list.</p>

<h2>From loop to comprehension</h2>
<p>Compare the two ways of building a list of squares. They produce the same result; the comprehension is shorter and reads as one idea.</p>
<pre class="code"># the long way
squares = []
for n in range(1, 6):
    squares.append(n * n)

# the comprehension
squares = [n * n for n in range(1, 6)]
print(squares)   # [1, 4, 9, 16, 25]</pre>
<p>Read it left to right: <em>"the value <code>n * n</code>, for each <code>n</code> in the range"</em>. The expression comes first, then the loop that feeds it.</p>

<h2>Filtering with a condition</h2>
<p>Add an <code>if</code> at the end to keep only some items. This filters as it builds.</p>
<pre class="code">numbers = range(1, 11)
evens = [n for n in numbers if n % 2 == 0]
print(evens)   # [2, 4, 6, 8, 10]</pre>
<div class="callout note"><span class="lbl">Note</span><p>An <code>if</code> at the <em>end</em> filters items out. That is different from a conditional expression at the <em>start</em>, which chooses the value: <code>["even" if n % 2 == 0 else "odd" for n in numbers]</code>. The position of the <code>if</code> changes its job entirely.</p></div>

<h2>Dictionary and set comprehensions</h2>
<p>The same shape works with curly brackets to build dictionaries and sets.</p>
<pre class="code"># dictionary comprehension: number -> its square
squares_map = {n: n * n for n in range(1, 5)}
print(squares_map)   # {1: 1, 2: 4, 3: 9, 4: 16}

# set comprehension: unique lengths of some words
words = ["hi", "hey", "hello", "yo"]
lengths = {len(w) for w in words}
print(lengths)       # {2, 3, 5}</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Do not cram too much into a comprehension. If it needs several conditions or a nested loop and stops being readable in one glance, a normal <code>for</code> loop is the better, clearer choice. Comprehensions are for simple, tidy transformations.</p></div>
`
},
{
  title:"Iterators & Generators",
  starter:'# A generator produces values one at a time, on demand\ndef count_up_to(limit):\n    n = 1\n    while n <= limit:\n        yield n         # hand back one value, then pause\n        n += 1\n\nfor number in count_up_to(5):\n    print(number)       # 1 2 3 4 5\n',
  html:`
<p>When you loop over a list, Python fetches its items one after another. The machinery that hands out items one at a time is called an <strong>iterator</strong>. A <strong>generator</strong> is an easy way to create your own iterator, producing values on demand instead of building them all at once.</p>

<h2>The problem generators solve</h2>
<p>Imagine you want the first million square numbers. Building them all into a list uses a lot of memory, even if you only need them one at a time. A generator produces each value as it is asked for, holding just one in memory at a time.</p>

<h2>Writing a generator with yield</h2>
<p>A generator looks like a normal function, but it uses <code>yield</code> instead of <code>return</code>. Each <code>yield</code> hands back one value and <strong>pauses</strong> the function, which resumes from that exact spot the next time a value is requested.</p>
<pre class="code">def count_up_to(limit):
    n = 1
    while n &lt;= limit:
        yield n         # give one value, then pause here
        n += 1

for number in count_up_to(3):
    print(number)
# 1
# 2
# 3</pre>
<div class="callout note"><span class="lbl">Note</span><p>The key difference from <code>return</code>: <code>return</code> ends a function for good, while <code>yield</code> pauses it and remembers where it was. That memory of position is what lets a generator produce a long sequence lazily.</p></div>

<h2>Generator expressions</h2>
<p>There is a comprehension-style shortcut too. Swap the square brackets of a list comprehension for round ones, and you get a <strong>generator expression</strong> that produces values lazily instead of building a list.</p>
<pre class="code"># a list — builds everything now
squares_list = [n * n for n in range(1, 6)]

# a generator — produces values only when asked
squares_gen = (n * n for n in range(1, 6))
print(sum(squares_gen))   # 55  (values produced one by one)</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>A generator can be used only <em>once</em>. After you have looped through it, it is exhausted and produces nothing more. If you need the values again, either recreate the generator or build a list.</p></div>
`
},
{
  title:"Decorators",
  starter:'# A decorator wraps a function to add behaviour around it\ndef announce(func):\n    def wrapper():\n        print("Before the function")\n        func()\n        print("After the function")\n    return wrapper\n\n@announce\ndef say_hello():\n    print("Hello!")\n\nsay_hello()\n',
  html:`
<p>A <strong>decorator</strong> is a function that takes another function and gives back a new, enhanced version of it. It lets you add behaviour <em>around</em> a function — before it, after it, or both — without changing the function's own code. To understand them, you first need one idea: in Python, functions are values.</p>

<h2>Functions are values</h2>
<p>A function can be stored in a variable, passed to another function, and returned from one — just like a number or a string. This is what makes decorators possible.</p>
<pre class="code">def shout(text):
    return text.upper()

yell = shout            # store the function itself (no brackets)
print(yell("hello"))    # HELLO — same function, new name</pre>

<h2>Building a decorator</h2>
<p>A decorator defines an inner <code>wrapper</code> function that calls the original and adds something around it, then returns that wrapper.</p>
<pre class="code">def announce(func):
    def wrapper():
        print("Starting...")
        func()                 # run the original function
        print("Finished.")
    return wrapper

def greet():
    print("Hello from CadetX")

greet = announce(greet)   # wrap greet in the extra behaviour
greet()
# Starting...
# Hello from CadetX
# Finished.</pre>

<h2>The @ shortcut</h2>
<p>Writing <code>greet = announce(greet)</code> by hand is clumsy. Python gives you the <code>@</code> syntax, which does exactly the same thing, placed just above the function.</p>
<pre class="code">def announce(func):
    def wrapper():
        print("Starting...")
        func()
        print("Finished.")
    return wrapper

@announce               # this means: greet = announce(greet)
def greet():
    print("Hello from CadetX")

greet()
# Starting...
# Hello from CadetX
# Finished.</pre>
<div class="callout note"><span class="lbl">Note</span><p>You have already seen a decorator: <code>@property</code> from Module 8. The <code>@</code> line always means "pass the function below to the decorator above, and use what it returns in place of the original".</p></div>
<div class="callout warn"><span class="lbl">Common mistake</span><p>If the function being decorated takes arguments, the wrapper must accept them too — usually written <code>def wrapper(*args, **kwargs):</code> and passed on as <code>func(*args, **kwargs)</code>. A wrapper with no parameters cannot wrap a function that needs some.</p></div>
`
},
{
  title:"Type Hints",
  starter:'# Type hints document what types a function expects and returns\ndef add(a: int, b: int) -> int:\n    return a + b\n\nprint(add(3, 4))   # 7\n\nname: str = "CadetX"\nprint(name)\n',
  html:`
<p>Python is dynamically typed — you never declare the type of a variable. <strong>Type hints</strong> let you add that information anyway, as optional labels. They do not change how the code runs; they document your intent, help editors catch mistakes, and make code easier to read.</p>

<h2>Hinting function parameters and returns</h2>
<p>Add <code>: type</code> after a parameter to say what it should be, and <code>-&gt; type</code> before the colon to say what the function returns.</p>
<pre class="code">def add(a: int, b: int) -&gt; int:
    return a + b

def greet(name: str) -&gt; str:
    return f"Hello, {name}"

print(add(2, 3))        # 7
print(greet("Alex"))    # Hello, Alex</pre>
<p>Read <code>a: int</code> as "a is expected to be an int", and <code>-&gt; int</code> as "this function returns an int".</p>

<h2>Hinting variables</h2>
<pre class="code">count: int = 0
title: str = "CadetX"
scores: list = [88, 92, 79]
active: bool = True</pre>

<h2>They are hints, not rules</h2>
<p>This is the crucial point: Python does <strong>not</strong> enforce type hints. Passing the wrong type still runs — the hint is ignored at runtime. Hints are checked by separate tools and editors, not by Python itself.</p>
<pre class="code">def double(n: int) -&gt; int:
    return n * 2

print(double("ab"))   # abab — Python ignores the hint and runs anyway</pre>
<div class="callout note"><span class="lbl">Note</span><p>Because hints are not enforced, they never cause errors on their own. Their value is in the tooling: editors use them to warn you before you run the code, and a reader instantly sees what a function expects. Think of them as documentation the computer can also read.</p></div>
<div class="callout tip"><span class="lbl">Tip</span><p>You do not need hints on every line. They pay off most on function signatures, where they tell a reader exactly what to pass in and what comes back — the place confusion is most costly.</p></div>
`
}
];

/* ════════════════════ SYNTAX HIGHLIGHTER ════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(code){
  code = esc(code);
  const store=[];
  code = code.replace(/#[^\n]*/g, m=>{store.push('<span class="c">'+m+'</span>');return '\u0000';});
  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m=>{store.push('<span class="s">'+m+'</span>');return '\u0000';});
  code = code.replace(/\b\d+\.?\d*\b/g, '<span class="n">$&</span>');
  const kw=['def','return','if','elif','else','for','while','in','and','or','not','is','print','True','False','None','import','from','as','class','with','break','continue','pass','lambda','input','range','len','str','int','float'];
  code = code.replace(new RegExp('\\b('+kw.join('|')+')\\b','g'), '<span class="k">$1</span>');
  let k=0; code = code.replace(/\u0000/g, ()=>store[k++]);
  return code;
}

/* ════════════════════ STATE + RENDER ════════════════════ */
const flat=[{type:"lesson",i:0},{type:"lesson",i:1},{type:"lesson",i:2},{type:"lesson",i:3},{type:"tasks"}];
let cur=0, tab='lesson';

function buildNav(filter=""){
  const f=filter.trim().toLowerCase();
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(sec=>{
    const wrap=document.createElement('div'); wrap.className='nav-section';
    const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=sec.label; wrap.appendChild(lbl);
    let shown=0;
    sec.items.forEach(it=>{
      if(f && !it.label.toLowerCase().includes(f)) return;
      shown++;
      const el=document.createElement('div');
      el.className='nav-item'+(it.type==='tasks'?' task':'')+(sec.locked?' locked':'');
      const isActive = !sec.locked && ((it.type==='lesson'&&flat[cur].type==='lesson'&&flat[cur].i===it.i)||(it.type==='tasks'&&flat[cur].type==='tasks'));
      if(isActive) el.classList.add('active');
      let inner = it.type==='tasks'
        ? '<span class="file-ic">📄</span>'+it.label+'<span class="count">'+it.count+'</span>'
        : '<span class="dot"></span>'+it.label;
      if(sec.locked) inner += '<span class="count" style="margin-left:auto">🔒</span>';
      el.innerHTML=inner;
      if(!sec.locked){
        el.onclick=()=>{
          cur = it.type==='tasks' ? flat.length-1 : it.i;
          tab='lesson'; render();
        };
      } else { el.title='Available in the full Part 1 build'; }
      wrap.appendChild(el);
    });
    if(shown>0) nav.appendChild(wrap);
  });
}

function render(){
  const item=flat[cur];
  const lessonView=document.getElementById('lesson-view');
  const ideView=document.getElementById('ide-view');

  if(item.type==='lesson'){
    const L=LESSONS[item.i];
    document.getElementById('crumb').textContent='11. Advanced Python';
    document.getElementById('title').textContent=L.title;
    lessonView.innerHTML=L.html;
    document.getElementById('editor').value=L.starter;
    document.getElementById('tab-ide').style.display='';
  } else {
    document.getElementById('crumb').textContent='11. Advanced Python';
    document.getElementById('title').textContent='Module 1 Tasks';
    lessonView.innerHTML=renderTasks();
    document.getElementById('editor').value='# Use this editor to solve any task above.\n# Type your code, then press Run code.\n\n';
    document.getElementById('tab-ide').style.display='';
  }

  // highlight static lesson code blocks
  lessonView.querySelectorAll('pre.code').forEach(pre=>{ pre.innerHTML='<code>'+highlight(pre.textContent)+'</code>'; });

  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  lessonView.style.display = tab==='lesson' ? 'block' : 'none';
  ideView.classList.toggle('show', tab==='ide');
  updateGutter();

  // arrows
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===flat.length-1;

  buildNav(document.getElementById('search').value);
  document.querySelector('.content-wrap').scrollTop=0;
}

function renderTasks(){
  let h='<p class="tasks-intro">Work through these in order — they start very simple and build up. Try each one in the <strong>Try it yourself</strong> tab before revealing the solution.</p>';
  TASKS.forEach((t,idx)=>{
    h+='<div class="task"><div class="task-head"><div class="task-num">'+(idx+1)+'</div><div class="task-text">'+t.p+'</div></div>'+
       '<details><summary><span class="chev">▸</span> Show solution</summary><div class="task-sol">'+
       '<pre class="code"><code>'+highlight(t.c)+'</code></pre><div class="sol-note">'+t.e+'</div></div></details></div>';
  });
  return h;
}

/* ════════════════════ EDITOR ════════════════════ */
function updateGutter(){
  const ed=document.getElementById('editor');
  const lines=ed.value.split('\n').length;
  let g=''; for(let i=1;i<=lines;i++) g+=i+'\n';
  document.getElementById('gutter').textContent=g.trim();
}
const editor=document.getElementById('editor');
editor.addEventListener('input',updateGutter);
editor.addEventListener('scroll',()=>{document.getElementById('gutter').scrollTop=editor.scrollTop;});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateGutter();
  }
});

/* ════════════════════ RUN (Skulpt) ════════════════════ */
function runCode(){
  const out=document.getElementById('output');
  if(typeof Sk==='undefined'){
    out.innerHTML='<span class="out-hint">▸ The Python engine is still loading. Give it a moment and try again.</span>';
    return;
  }
  const code=document.getElementById('editor').value;
  out.innerHTML=''; let buf='';
  const write=t=>{buf+=t; out.innerHTML='<span class="out-ok">'+esc(buf)+'</span>'; out.scrollTop=out.scrollHeight;};
  const readf=x=>{ if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined) throw "File not found: '"+x+"'"; return Sk.builtinFiles["files"][x]; };
  Sk.configure({output:write, read:readf, __future__:Sk.python3, execLimit:10000});
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{ if(!buf) out.innerHTML='<span class="out-hint">▸ Program finished with no output.</span>'; },
          err=>{ out.innerHTML='<span class="out-err">'+esc(err.toString())+'</span>'; });
}
document.getElementById('run').onclick=runCode;
document.getElementById('reset').onclick=()=>{
  const item=flat[cur];
  document.getElementById('editor').value = item.type==='lesson' ? LESSONS[item.i].starter : '# Use this editor to solve any task above.\n\n';
  document.getElementById('output').innerHTML='<span class="out-hint">▸ Code reset.</span>';
  updateGutter();
};

/* ════════════════════ WIRING ════════════════════ */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ tab=t.dataset.tab; render(); });
document.getElementById('prev').onclick=()=>{ if(cur>0){cur--;tab='lesson';render();} };
document.getElementById('next').onclick=()=>{ if(cur<flat.length-1){cur++;tab='lesson';render();} };
document.getElementById('search').addEventListener('input',e=>buildNav(e.target.value));

buildNav();
render();
</script>
