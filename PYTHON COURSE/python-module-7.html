html,body{margin:0;height:100%}
body{

.logo-pill{

  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.logo-cadet{color:var(--navy)}
.logo-x{color:var(--crimson)}
.brand-name{font-weight:700;font-size:16px;letter-spacing:.2px;color:#fff}

.nav-label{

<script>
/* ════════════════════ CONTENT ════════════════════ */
const LESSONS = [
{
  title:"Classes & Objects",
  starter:'# A class is a blueprint; an object is a thing built from it\nclass Dog:\n    pass\n\nrex = Dog()\nbella = Dog()\nprint(type(rex))       # <class \'__main__.Dog\'>\nprint(rex is bella)    # False — two separate objects\n',
  html:`
<p>Everything you have built so far keeps data (variables) and behaviour (functions) separate. <strong>Object-oriented programming</strong>, or OOP, brings them together. You bundle related data and the functions that act on it into a single unit called an <strong>object</strong>. It is a way of modelling things from the real world in code.</p>

<h2>Classes and objects: blueprint and thing</h2>
<p>A <strong>class</strong> is a blueprint. An <strong>object</strong> (also called an <strong>instance</strong>) is a specific thing built from that blueprint. Think of a class as a cookie cutter and objects as the individual cookies: one cutter, many cookies, each separate.</p>
<pre class="code">class Dog:
    pass          # an empty class for now

rex = Dog()       # rex is an object built from the Dog blueprint
bella = Dog()     # a second, separate Dog
print(type(rex))  # &lt;class '__main__.Dog'&gt;</pre>
<p>You have used objects since Module 2 without knowing it. When you wrote <code>"hello".upper()</code>, the string was an object and <code>.upper()</code> was one of its methods. Now you are making your own kinds of object.</p>
<div class="callout note"><span class="lbl">Note</span><p>By convention, class names use <strong>PascalCase</strong> — each word capitalised with no underscores, like <code>BankAccount</code>. This differs from the <code>snake_case</code> used for variables and functions, and it helps a reader spot classes at a glance.</p></div>

<h2>Creating an instance</h2>
<p>You build an object by writing the class name followed by brackets, just like calling a function. Each call makes a fresh, independent object.</p>
<pre class="code">class Dog:
    pass

first = Dog()
second = Dog()
print(first is second)   # False — two separate objects</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Confusing the class with the instance. <code>Dog</code> is the blueprint; <code>Dog()</code> builds an actual dog. You read data and call methods on the instance, not on the class.</p></div>
`
},
{
  title:"The __init__ Method",
  starter:'# __init__ runs automatically when an object is created\nclass Dog:\n    def __init__(self, name, age):\n        self.name = name\n        self.age = age\n\nrex = Dog("Rex", 5)\nprint(rex.name)   # Rex\nprint(rex.age)    # 5\n',
  html:`
<p>An empty class is not much use. To give each object its own data, you use a special method called <code>__init__</code> — the <strong>initialiser</strong>. Python runs it automatically every time you create an instance, so it is where you set up the object's starting data.</p>

<h2>Setting up data with __init__</h2>
<pre class="code">class Dog:
    def __init__(self, name, age):
        self.name = name     # store the name on this object
        self.age = age       # store the age on this object

rex = Dog("Rex", 5)
print(rex.name)   # Rex
print(rex.age)    # 5</pre>
<p>The name is wrapped in double underscores on each side. Methods named this way are called <strong>dunder</strong> ("double underscore") methods, and Python calls them for you at special moments — here, at the moment of creation.</p>

<h2>What is self?</h2>
<p><code>self</code> is the single most confusing part of OOP, so let us be clear. <code>self</code> is the <strong>particular object being worked on</strong>. When you write <code>Dog("Rex", 5)</code>, Python creates a new empty object and passes it in as <code>self</code>. Inside <code>__init__</code>, <code>self.name = name</code> means "store this name on <em>this</em> object".</p>
<pre class="code">rex = Dog("Rex", 5)      # self is rex during this call
bella = Dog("Bella", 2)  # self is bella during this call
print(rex.name)          # Rex   — rex has its own name
print(bella.name)        # Bella — bella has its own name</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Two errors dominate here. First, forgetting <code>self</code> as the first parameter of <code>__init__</code>. Second, forgetting the <code>self.</code> prefix — writing <code>name = name</code> creates a throwaway local variable that vanishes, instead of storing it on the object with <code>self.name = name</code>.</p></div>
<div class="callout note"><span class="lbl">Note</span><p>You never pass <code>self</code> yourself. <code>Dog("Rex", 5)</code> supplies only <code>name</code> and <code>age</code>; Python fills in <code>self</code> automatically. That is why the definition lists three parameters but the call passes two arguments.</p></div>
`
},
{
  title:"Methods",
  starter:'# A method is a function that belongs to a class\nclass Dog:\n    def __init__(self, name):\n        self.name = name\n\n    def bark(self):\n        print(f"{self.name} says Woof!")\n\nrex = Dog("Rex")\nrex.bark()   # Rex says Woof!\n',
  html:`
<p>Data alone is not enough — objects also need <strong>behaviour</strong>. A <strong>method</strong> is a function defined inside a class. It describes something the object can do, and it can use and change that object's own data.</p>

<h2>Defining and calling a method</h2>
<p>A method looks like a normal function, except it lives inside the class and takes <code>self</code> as its first parameter. You call it on an object with a dot.</p>
<pre class="code">class Dog:
    def __init__(self, name):
        self.name = name

    def bark(self):
        print(f"{self.name} says Woof!")

rex = Dog("Rex")
rex.bark()      # Rex says Woof!</pre>
<p>Through <code>self</code>, the method can reach the object's attributes — that is how <code>bark</code> knows the dog's name. Note you write <code>rex.bark()</code>, not <code>rex.bark</code>: the brackets run it, just like any function call.</p>

<h2>Methods that take extra information</h2>
<p>A method can have more parameters after <code>self</code>, passed as normal arguments when you call it.</p>
<pre class="code">class Dog:
    def __init__(self, name):
        self.name = name

    def greet(self, other_name):
        print(f"{self.name} greets {other_name}")

rex = Dog("Rex")
rex.greet("Bella")   # Rex greets Bella</pre>

<h2>Methods that change the object</h2>
<p>Because a method has <code>self</code>, it can update the object's attributes, not just read them.</p>
<pre class="code">class Counter:
    def __init__(self):
        self.count = 0

    def increment(self):
        self.count += 1     # change this object's data

c = Counter()
c.increment()
c.increment()
print(c.count)   # 2</pre>
<div class="callout note"><span class="lbl">Note</span><p>A function and a method are almost the same thing. The difference is that a method belongs to a class and receives the object as <code>self</code>, so it always has the object's data close at hand.</p></div>
`
},
{
  title:"Class Attributes & Dunder Methods",
  starter:'# A class attribute is shared by every object of the class\nclass Dog:\n    species = "Canis familiaris"\n\n    def __init__(self, name):\n        self.name = name\n\n    def __str__(self):\n        return f"Dog: {self.name}"\n\nrex = Dog("Rex")\nprint(rex.species)   # Canis familiaris\nprint(rex)           # Dog: Rex\n',
  html:`
<p>Attributes set with <code>self.</code> in <code>__init__</code> belong to each object separately — they are <strong>instance attributes</strong>. Sometimes you want a value shared by <em>every</em> object of a class. That is a <strong>class attribute</strong>, and you define it in the class body, outside any method.</p>

<h2>Class attributes are shared</h2>
<pre class="code">class Dog:
    species = "Canis familiaris"   # class attribute — shared by all dogs

    def __init__(self, name):
        self.name = name           # instance attribute — unique per dog

rex = Dog("Rex")
bella = Dog("Bella")
print(rex.species)     # Canis familiaris
print(bella.species)   # Canis familiaris (the same shared value)
print(Dog.species)     # you can read it on the class too</pre>
<table>
<tr><th>Instance attribute</th><th>Class attribute</th></tr>
<tr><td>set with <code>self.x =</code> in a method</td><td>set in the class body</td></tr>
<tr><td>different for each object</td><td>shared by all objects</td></tr>
<tr><td>e.g. a dog's name</td><td>e.g. the species of all dogs</td></tr>
</table>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Do not use a changeable value like a list as a class attribute unless you truly want it shared. If every object appends to the same class-level list, they all see each other's changes — the same trap as mutable defaults in Module 5. Put per-object lists in <code>__init__</code> with <code>self.</code>.</p></div>

<h2>Making objects print nicely: __str__</h2>
<p>By default, printing an object shows something unhelpful like <code>&lt;__main__.Dog object at 0x7f...&gt;</code>. You control this by defining the dunder method <code>__str__</code>, which returns the text you want <code>print</code> to show.</p>
<pre class="code">class Dog:
    def __init__(self, name, age):
        self.name = name
        self.age = age

    def __str__(self):
        return f"Dog(name={self.name}, age={self.age})"

rex = Dog("Rex", 5)
print(rex)   # Dog(name=Rex, age=5)</pre>
<div class="callout note"><span class="lbl">Note</span><p><code>__str__</code> must <em>return</em> a string, not print one. Python calls it whenever an object needs to be shown as text, and uses whatever string you hand back.</p></div>
`
}
];

/* ════════════════════ SYNTAX HIGHLIGHTER ════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(code){
  code = esc(code);
  const store=[];
  code = code.replace(/#[^\n]*/g, m=>{store.push('<span class="c">'+m+'</span>');return '\u0000';});
  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m=>{store.push('<span class="s">'+m+'</span>');return '\u0000';});
  code = code.replace(/\b\d+\.?\d*\b/g, '<span class="n">$&</span>');
  const kw=['def','return','if','elif','else','for','while','in','and','or','not','is','print','True','False','None','import','from','as','class','with','break','continue','pass','lambda','input','range','len','str','int','float'];
  code = code.replace(new RegExp('\\b('+kw.join('|')+')\\b','g'), '<span class="k">$1</span>');
  let k=0; code = code.replace(/\u0000/g, ()=>store[k++]);
  return code;
}

/* ════════════════════ STATE + RENDER ════════════════════ */
const flat=[{type:"lesson",i:0},{type:"lesson",i:1},{type:"lesson",i:2},{type:"lesson",i:3},{type:"tasks"}];
let cur=0, tab='lesson';

function buildNav(filter=""){
  const f=filter.trim().toLowerCase();
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(sec=>{
    const wrap=document.createElement('div'); wrap.className='nav-section';
    const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=sec.label; wrap.appendChild(lbl);
    let shown=0;
    sec.items.forEach(it=>{
      if(f && !it.label.toLowerCase().includes(f)) return;
      shown++;
      const el=document.createElement('div');
      el.className='nav-item'+(it.type==='tasks'?' task':'')+(sec.locked?' locked':'');
      const isActive = !sec.locked && ((it.type==='lesson'&&flat[cur].type==='lesson'&&flat[cur].i===it.i)||(it.type==='tasks'&&flat[cur].type==='tasks'));
      if(isActive) el.classList.add('active');
      let inner = it.type==='tasks'
        ? '<span class="file-ic">📄</span>'+it.label+'<span class="count">'+it.count+'</span>'
        : '<span class="dot"></span>'+it.label;
      if(sec.locked) inner += '<span class="count" style="margin-left:auto">🔒</span>';
      el.innerHTML=inner;
      if(!sec.locked){
        el.onclick=()=>{
          cur = it.type==='tasks' ? flat.length-1 : it.i;
          tab='lesson'; render();
        };
      } else { el.title='Available in the full Part 1 build'; }
      wrap.appendChild(el);
    });
    if(shown>0) nav.appendChild(wrap);
  });
}

function render(){
  const item=flat[cur];
  const lessonView=document.getElementById('lesson-view');
  const ideView=document.getElementById('ide-view');

  if(item.type==='lesson'){
    const L=LESSONS[item.i];
    document.getElementById('crumb').textContent='7. Object-Oriented Programming';
    document.getElementById('title').textContent=L.title;
    lessonView.innerHTML=L.html;
    document.getElementById('editor').value=L.starter;
    document.getElementById('tab-ide').style.display='';
  } else {
    document.getElementById('crumb').textContent='7. Object-Oriented Programming';
    document.getElementById('title').textContent='Module 1 Tasks';
    lessonView.innerHTML=renderTasks();
    document.getElementById('editor').value='# Use this editor to solve any task above.\n# Type your code, then press Run code.\n\n';
    document.getElementById('tab-ide').style.display='';
  }

  // highlight static lesson code blocks
  lessonView.querySelectorAll('pre.code').forEach(pre=>{ pre.innerHTML='<code>'+highlight(pre.textContent)+'</code>'; });

  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  lessonView.style.display = tab==='lesson' ? 'block' : 'none';
  ideView.classList.toggle('show', tab==='ide');
  updateGutter();

  // arrows
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===flat.length-1;

  buildNav(document.getElementById('search').value);
  document.querySelector('.content-wrap').scrollTop=0;
}

function renderTasks(){
  let h='<p class="tasks-intro">Work through these in order — they start very simple and build up. Try each one in the <strong>Try it yourself</strong> tab before revealing the solution.</p>';
  TASKS.forEach((t,idx)=>{
    h+='<div class="task"><div class="task-head"><div class="task-num">'+(idx+1)+'</div><div class="task-text">'+t.p+'</div></div>'+
       '<details><summary><span class="chev">▸</span> Show solution</summary><div class="task-sol">'+
       '<pre class="code"><code>'+highlight(t.c)+'</code></pre><div class="sol-note">'+t.e+'</div></div></details></div>';
  });
  return h;
}

/* ════════════════════ EDITOR ════════════════════ */
function updateGutter(){
  const ed=document.getElementById('editor');
  const lines=ed.value.split('\n').length;
  let g=''; for(let i=1;i<=lines;i++) g+=i+'\n';
  document.getElementById('gutter').textContent=g.trim();
}
const editor=document.getElementById('editor');
editor.addEventListener('input',updateGutter);
editor.addEventListener('scroll',()=>{document.getElementById('gutter').scrollTop=editor.scrollTop;});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateGutter();
  }
});

/* ════════════════════ RUN (Skulpt) ════════════════════ */
function runCode(){
  const out=document.getElementById('output');
  if(typeof Sk==='undefined'){
    out.innerHTML='<span class="out-hint">▸ The Python engine is still loading. Give it a moment and try again.</span>';
    return;
  }
  const code=document.getElementById('editor').value;
  out.innerHTML=''; let buf='';
  const write=t=>{buf+=t; out.innerHTML='<span class="out-ok">'+esc(buf)+'</span>'; out.scrollTop=out.scrollHeight;};
  const readf=x=>{ if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined) throw "File not found: '"+x+"'"; return Sk.builtinFiles["files"][x]; };
  Sk.configure({output:write, read:readf, __future__:Sk.python3, execLimit:10000});
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{ if(!buf) out.innerHTML='<span class="out-hint">▸ Program finished with no output.</span>'; },
          err=>{ out.innerHTML='<span class="out-err">'+esc(err.toString())+'</span>'; });
}
document.getElementById('run').onclick=runCode;
document.getElementById('reset').onclick=()=>{
  const item=flat[cur];
  document.getElementById('editor').value = item.type==='lesson' ? LESSONS[item.i].starter : '# Use this editor to solve any task above.\n\n';
  document.getElementById('output').innerHTML='<span class="out-hint">▸ Code reset.</span>';
  updateGutter();
};

/* ════════════════════ WIRING ════════════════════ */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ tab=t.dataset.tab; render(); });
document.getElementById('prev').onclick=()=>{ if(cur>0){cur--;tab='lesson';render();} };
document.getElementById('next').onclick=()=>{ if(cur<flat.length-1){cur++;tab='lesson';render();} };

buildNav();
render();
