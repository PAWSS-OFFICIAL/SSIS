<script>
/* ════════════════════ CONTENT ════════════════════ */
const LESSONS = [
{
  title:"Reading & Writing Files",
  starter:'# Writing text to a file\nwith open("notes.txt", "w") as f:\n    f.write("Hello from CadetX\\n")\n    f.write("Learning Python\\n")\n\n# Reading it back\nwith open("notes.txt", "r") as f:\n    print(f.read())\n',
  html:`
<p>Programs often need to keep data after they stop running, or read data prepared earlier. That means working with <strong>files</strong> on disk. Python handles files through the built-in <code>open()</code> function, which connects your program to a file so you can read from it or write to it.</p>

<h2>Opening a file: the mode matters</h2>
<p><code>open()</code> takes the file name and a <strong>mode</strong> that says what you intend to do. Choosing the wrong mode is the most common file mistake, so learn these four.</p>
<table>
<tr><th>Mode</th><th>Meaning</th></tr>
<tr><td><code>"r"</code></td><td>Read (the default). Errors if the file is missing.</td></tr>
<tr><td><code>"w"</code></td><td>Write. Creates the file, or <strong>wipes</strong> it if it exists.</td></tr>
<tr><td><code>"a"</code></td><td>Append. Adds to the end, keeping what is there.</td></tr>
<tr><td><code>"x"</code></td><td>Create. Errors if the file already exists.</td></tr>
</table>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Mode <code>"w"</code> empties the file the moment you open it, even before you write anything. If you meant to add to a file rather than replace it, use <code>"a"</code>.</p></div>

<h2>Writing to a file</h2>
<p>The recommended way to open a file is with a <code>with</code> block, which you will meet fully in the Context Managers lesson. It guarantees the file is closed for you when the block ends.</p>
<pre class="code">with open("notes.txt", "w") as f:
    f.write("Hello from CadetX\\n")   # write() does NOT add a newline
    f.write("Learning Python\\n")     # so add \\n yourself</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Unlike <code>print()</code>, the <code>write()</code> method does not add a newline. Forget the <code>\\n</code> and everything runs together on one line. Add it yourself at the end of each piece of text.</p></div>

<h2>Reading from a file</h2>
<p>There are three common ways to read. <code>.read()</code> gives the whole file as one string; looping over the file gives one line at a time, which is the most memory-friendly.</p>
<pre class="code"># The whole file at once
with open("notes.txt", "r") as f:
    content = f.read()
    print(content)

# One line at a time (best for large files)
with open("notes.txt", "r") as f:
    for line in f:
        print(line.strip())   # strip removes the trailing newline</pre>
<div class="callout note"><span class="lbl">Note</span><p>Each line you read keeps its newline character on the end, so printing lines can produce double spacing. <code>line.strip()</code> removes that trailing newline, which is why it appears so often in file-reading code.</p></div>

<h2>Closing files</h2>
<p>If you open a file without <code>with</code>, you must close it yourself with <code>f.close()</code>, or the file may stay locked and unsaved. The <code>with</code> block does this automatically, which is exactly why it is preferred.</p>
<pre class="code">f = open("notes.txt", "r")
content = f.read()
f.close()          # you must remember this without a with block</pre>
`
},
{
  title:"CSV & JSON",
  starter:'import json\n\nstudent = {"name": "Alex", "score": 88}\n\n# Turn a Python object into a JSON string\ntext = json.dumps(student)\nprint(text)          # {"name": "Alex", "score": 88}\n\n# Turn a JSON string back into a Python object\nback = json.loads(text)\nprint(back["name"])  # Alex\n',
  html:`
<p>Plain text files are fine for simple notes, but data usually has structure — rows and columns, or nested records. Two formats dominate: <strong>CSV</strong> for tables and <strong>JSON</strong> for structured data. Python has a module for each.</p>

<h2>CSV: comma-separated values</h2>
<p>A CSV file is a table in plain text: each line is a row, and commas separate the columns. Spreadsheets read and write them directly. The <code>csv</code> module handles the fiddly details like quoting.</p>
<pre class="code">import csv

# Writing rows
with open("scores.csv", "w", newline="") as f:
    writer = csv.writer(f)
    writer.writerow(["name", "score"])   # the header row
    writer.writerow(["Alex", 88])
    writer.writerow(["Sam", 92])

# Reading rows
with open("scores.csv", "r") as f:
    reader = csv.reader(f)
    for row in reader:
        print(row)      # each row is a list: ['name', 'score'] ...</pre>
<div class="callout note"><span class="lbl">Note</span><p>When writing CSV, open the file with <code>newline=""</code>. Without it, some systems add blank lines between rows. It is a small detail that saves a confusing bug.</p></div>
<p><code>csv.DictReader</code> is often nicer: it uses the header row to give each value a name, so you read by column name instead of by position.</p>
<pre class="code">import csv

with open("scores.csv", "r") as f:
    reader = csv.DictReader(f)
    for row in reader:
        print(row["name"], row["score"])   # read by column name</pre>

<h2>JSON: structured data as text</h2>
<p>JSON (JavaScript Object Notation) stores nested data — dictionaries and lists — as text. It maps almost perfectly onto Python: a JSON object becomes a dict, a JSON array becomes a list. The <code>json</code> module converts between them.</p>
<table>
<tr><th>Function</th><th>Direction</th></tr>
<tr><td><code>json.dumps(obj)</code></td><td>Python object → JSON string</td></tr>
<tr><td><code>json.loads(text)</code></td><td>JSON string → Python object</td></tr>
<tr><td><code>json.dump(obj, f)</code></td><td>Python object → file</td></tr>
<tr><td><code>json.load(f)</code></td><td>file → Python object</td></tr>
</table>
<pre class="code">import json

student = {"name": "Alex", "scores": [88, 92, 79]}

text = json.dumps(student)      # object to string
print(text)

back = json.loads(text)         # string back to object
print(back["scores"][0])        # 88</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>The names ending in <strong>s</strong> work with strings (<code>dumps</code>/<code>loads</code>); the ones without work with files (<code>dump</code>/<code>load</code>). Mixing them up is a frequent slip. Also, all JSON keys become strings, so a dict with number keys comes back with string keys.</p></div>
`
},
{
  title:"Exceptions & try / except",
  starter:'# try runs risky code; except catches the error if it happens\ntry:\n    number = int("not a number")\nexcept ValueError:\n    print("That was not a valid number")\n\nprint("The program keeps going")\n',
  html:`
<p>When something goes wrong at runtime — dividing by zero, converting bad text to a number, opening a missing file — Python raises an <strong>exception</strong> and, by default, stops the program. You have met several already: <code>ValueError</code>, <code>TypeError</code>, <code>ZeroDivisionError</code>, <code>KeyError</code>. This lesson shows how to catch them and carry on.</p>

<h2>try and except</h2>
<p>Put the risky code in a <code>try</code> block. If an exception happens, Python jumps to the matching <code>except</code> block instead of crashing.</p>
<pre class="code">try:
    result = 10 / 0
except ZeroDivisionError:
    print("You cannot divide by zero")
# You cannot divide by zero</pre>

<h2>Catch specific exceptions</h2>
<p>Always name the exception you expect. Different problems can then be handled differently, and unexpected errors still surface instead of being hidden.</p>
<pre class="code">try:
    age = int(user_input)
except ValueError:
    print("Please enter a whole number")
except TypeError:
    print("No value was supplied")</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Avoid a bare <code>except:</code> that catches everything. It hides real bugs — even a typo in your own code gets swallowed silently. Catch the specific exceptions you expect, and let the rest be seen.</p></div>

<h2>else and finally</h2>
<p>Two optional blocks complete the picture. <code>else</code> runs only if no exception happened; <code>finally</code> runs no matter what, which is perfect for clean-up.</p>
<pre class="code">try:
    number = int("42")
except ValueError:
    print("Bad input")
else:
    print(f"Success: {number}")   # runs because there was no error
finally:
    print("This always runs")     # runs whether or not there was an error
# Success: 42
# This always runs</pre>

<h2>Raising your own exceptions</h2>
<p>You can trigger an exception yourself with <code>raise</code>, to stop bad data early with a clear message.</p>
<pre class="code">def set_age(age):
    if age &lt; 0:
        raise ValueError("Age cannot be negative")
    return age

try:
    set_age(-5)
except ValueError as error:
    print(error)   # Age cannot be negative</pre>
<div class="callout note"><span class="lbl">Note</span><p><code>except ValueError as error</code> captures the exception object in a name, so you can read its message. This is the standard way to inspect what actually went wrong.</p></div>
`
},
{
  title:"Context Managers",
  starter:'# with handles setup and clean-up for you\nwith open("notes.txt", "w") as f:\n    f.write("Saved safely\\n")\n# the file is closed automatically here, even if an error occurred\n\nprint("File is now closed")\n',
  html:`
<p>A <strong>context manager</strong> is an object that sets something up and then guarantees it is cleaned up afterwards, even if an error happens in between. You use one with the <code>with</code> statement. You have already seen it opening files — this lesson explains what it is really doing.</p>

<h2>Why with exists</h2>
<p>Opening a file reserves a resource that must be released. Forget to close it and you can lose data or lock the file. Doing it safely by hand needs <code>try</code>/<code>finally</code>.</p>
<pre class="code"># The manual, error-prone way
f = open("notes.txt", "w")
try:
    f.write("hello")
finally:
    f.close()        # must remember this on every path</pre>
<p>The <code>with</code> statement does exactly this for you. It closes the file automatically at the end of the block, whether it finished normally or raised an error.</p>
<pre class="code"># The clean way — with does the closing for you
with open("notes.txt", "w") as f:
    f.write("hello")
# f is closed automatically here</pre>
<div class="callout tip"><span class="lbl">Tip</span><p>Always open files with <code>with</code>. It is shorter, safer, and you can never forget to close the file because Python does it for you.</p></div>

<h2>Use the file only inside the block</h2>
<pre class="code">with open("notes.txt", "r") as f:
    content = f.read()

print(content)          # fine — content is a normal string
# f.read()              # error: the file is already closed out here</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Trying to use the file object after the <code>with</code> block has ended. Once the block finishes, the file is closed, and reading or writing it raises a <code>ValueError</code>. Do all the file work inside the block; keep the data you need in a variable.</p></div>

<h2>Managing more than one thing</h2>
<p>You can open several resources in one <code>with</code>, which is handy for reading one file and writing another.</p>
<pre class="code">with open("input.txt", "r") as source, open("output.txt", "w") as target:
    for line in source:
        target.write(line.upper())</pre>
<div class="callout note"><span class="lbl">Note</span><p>Under the surface, any object with the dunder methods <code>__enter__</code> and <code>__exit__</code> can be used with <code>with</code>. Files provide them, which is why <code>open()</code> works this way. You can even add them to your own classes, building on the dunder methods from Module 7.</p></div>
`
}
];

/* ════════════════════ SYNTAX HIGHLIGHTER ════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(code){
  code = esc(code);
  const store=[];
  code = code.replace(/#[^\n]*/g, m=>{store.push('<span class="c">'+m+'</span>');return '\u0000';});
  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m=>{store.push('<span class="s">'+m+'</span>');return '\u0000';});
  code = code.replace(/\b\d+\.?\d*\b/g, '<span class="n">$&</span>');
  const kw=['def','return','if','elif','else','for','while','in','and','or','not','is','print','True','False','None','import','from','as','class','with','break','continue','pass','lambda','input','range','len','str','int','float'];
  code = code.replace(new RegExp('\\b('+kw.join('|')+')\\b','g'), '<span class="k">$1</span>');
  let k=0; code = code.replace(/\u0000/g, ()=>store[k++]);
  return code;
}

/* ════════════════════ STATE + RENDER ════════════════════ */
const flat=[{type:"lesson",i:0},{type:"lesson",i:1},{type:"lesson",i:2},{type:"lesson",i:3},{type:"tasks"}];
let cur=0, tab='lesson';

function buildNav(filter=""){
  const f=filter.trim().toLowerCase();
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(sec=>{
    const wrap=document.createElement('div'); wrap.className='nav-section';
    const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=sec.label; wrap.appendChild(lbl);
    let shown=0;
    sec.items.forEach(it=>{
      if(f && !it.label.toLowerCase().includes(f)) return;
      shown++;
      const el=document.createElement('div');
      el.className='nav-item'+(it.type==='tasks'?' task':'')+(sec.locked?' locked':'');
      const isActive = !sec.locked && ((it.type==='lesson'&&flat[cur].type==='lesson'&&flat[cur].i===it.i)||(it.type==='tasks'&&flat[cur].type==='tasks'));
      if(isActive) el.classList.add('active');
      let inner = it.type==='tasks'
        ? '<span class="file-ic">📄</span>'+it.label+'<span class="count">'+it.count+'</span>'
        : '<span class="dot"></span>'+it.label;
      if(sec.locked) inner += '<span class="count" style="margin-left:auto">🔒</span>';
      el.innerHTML=inner;
      if(!sec.locked){
        el.onclick=()=>{
          cur = it.type==='tasks' ? flat.length-1 : it.i;
          tab='lesson'; render();
        };
      } else { el.title='Available in the full Part 1 build'; }
      wrap.appendChild(el);
    });
    if(shown>0) nav.appendChild(wrap);
  });
}

function render(){
  const item=flat[cur];
  const lessonView=document.getElementById('lesson-view');
  const ideView=document.getElementById('ide-view');

  if(item.type==='lesson'){
    const L=LESSONS[item.i];
    document.getElementById('crumb').textContent='9. Files & Exceptions';
    document.getElementById('title').textContent=L.title;
    lessonView.innerHTML=L.html;
    document.getElementById('editor').value=L.starter;
    document.getElementById('tab-ide').style.display='';
  } else {
    document.getElementById('crumb').textContent='9. Files & Exceptions';
    document.getElementById('title').textContent='Module 1 Tasks';
    lessonView.innerHTML=renderTasks();
    document.getElementById('editor').value='# Use this editor to solve any task above.\n# Type your code, then press Run code.\n\n';
    document.getElementById('tab-ide').style.display='';
  }

  // highlight static lesson code blocks
  lessonView.querySelectorAll('pre.code').forEach(pre=>{ pre.innerHTML='<code>'+highlight(pre.textContent)+'</code>'; });

  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  lessonView.style.display = tab==='lesson' ? 'block' : 'none';
  ideView.classList.toggle('show', tab==='ide');
  updateGutter();

  // arrows
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===flat.length-1;

  buildNav(document.getElementById('search').value);
  document.querySelector('.content-wrap').scrollTop=0;
}

function renderTasks(){
  let h='<p class="tasks-intro">Work through these in order — they start very simple and build up. Try each one in the <strong>Try it yourself</strong> tab before revealing the solution.</p>';
  TASKS.forEach((t,idx)=>{
    h+='<div class="task"><div class="task-head"><div class="task-num">'+(idx+1)+'</div><div class="task-text">'+t.p+'</div></div>'+
       '<details><summary><span class="chev">▸</span> Show solution</summary><div class="task-sol">'+
       '<pre class="code"><code>'+highlight(t.c)+'</code></pre><div class="sol-note">'+t.e+'</div></div></details></div>';
  });
  return h;
}

/* ════════════════════ EDITOR ════════════════════ */
function updateGutter(){
  const ed=document.getElementById('editor');
  const lines=ed.value.split('\n').length;
  let g=''; for(let i=1;i<=lines;i++) g+=i+'\n';
  document.getElementById('gutter').textContent=g.trim();
}
const editor=document.getElementById('editor');
editor.addEventListener('input',updateGutter);
editor.addEventListener('scroll',()=>{document.getElementById('gutter').scrollTop=editor.scrollTop;});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateGutter();
  }
});

/* ════════════════════ RUN (Skulpt) ════════════════════ */
function runCode(){
  const out=document.getElementById('output');
  if(typeof Sk==='undefined'){
    out.innerHTML='<span class="out-hint">▸ The Python engine is still loading. Give it a moment and try again.</span>';
    return;
  }
  const code=document.getElementById('editor').value;
  out.innerHTML=''; let buf='';
  const write=t=>{buf+=t; out.innerHTML='<span class="out-ok">'+esc(buf)+'</span>'; out.scrollTop=out.scrollHeight;};
  const readf=x=>{ if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined) throw "File not found: '"+x+"'"; return Sk.builtinFiles["files"][x]; };
  Sk.configure({output:write, read:readf, __future__:Sk.python3, execLimit:10000});
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{ if(!buf) out.innerHTML='<span class="out-hint">▸ Program finished with no output.</span>'; },
          err=>{ out.innerHTML='<span class="out-err">'+esc(err.toString())+'</span>'; });
}
document.getElementById('run').onclick=runCode;
document.getElementById('reset').onclick=()=>{
  const item=flat[cur];
  document.getElementById('editor').value = item.type==='lesson' ? LESSONS[item.i].starter : '# Use this editor to solve any task above.\n\n';
  document.getElementById('output').innerHTML='<span class="out-hint">▸ Code reset.</span>';
  updateGutter();
};
