<script>
/* ════════════════════ CONTENT ════════════════════ */
const LESSONS = [
{
  title:"Variables",
  starter:'# A variable is a name that refers to a value\ncourse = "Python"\nlevel = "Beginner"\nyear = 2026\n\nprint(course)\nprint(level)\nprint(year)\n',
  html:`
<p>A <strong>variable</strong> is a name that refers to a value. You create one by choosing a name, writing <code>=</code>, and putting a value on the right. From then on, the name stands in for that value wherever you use it.</p>
<pre class="code">course = "Python"
level = "Beginner"
year = 2026

print(course)   # Python
print(year)     # 2026</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>The <code>=</code> sign here means "assign", not "is equal to". <code>course = "Python"</code> does not test anything — it puts the value <code>"Python"</code> into the name <code>course</code>. Testing for equality uses <code>==</code>, which you meet in Module 3.</p></div>

<h2>A name is a label, not a box</h2>
<p>It is tempting to picture a variable as a box that holds a value. A more accurate picture in Python is a <strong>label</strong> tied to a value that lives somewhere in memory. When you write <code>year = 2026</code>, Python creates the value <code>2026</code> and points the label <code>year</code> at it.</p>
<p>This matters because two names can point at the <em>same</em> value, and reassigning one name simply moves its label — it does not disturb the other.</p>
<pre class="code">a = 100
b = a       # b now points at the same value as a
a = 200     # a is re-pointed; b is untouched
print(a)    # 200
print(b)    # 100</pre>
<div class="callout note"><span class="lbl">Note</span><p>In C, a variable <em>is</em> a fixed slot in memory and its type is decided up front. In Python a variable is only a name attached to an object, which is why it can be re-pointed freely — even to a value of a completely different type.</p></div>

<h2>Naming rules and conventions</h2>
<p>Python is strict about what a name may contain, and adds strong conventions on top of the rules.</p>
<table>
<tr><th>Rule</th><th>Example</th></tr>
<tr><td>May contain letters, digits and underscores</td><td><code>total_score</code>, <code>value2</code></td></tr>
<tr><td>Must not start with a digit</td><td><code>2fast</code> is invalid; <code>fast2</code> is fine</td></tr>
<tr><td>No spaces or symbols</td><td>use <code>first_name</code>, not <code>first name</code></td></tr>
<tr><td>Case-sensitive</td><td><code>Score</code> and <code>score</code> are different names</td></tr>
<tr><td>Cannot be a reserved word</td><td><code>class</code>, <code>if</code>, <code>for</code> are off-limits</td></tr>
</table>
<p>The agreed style (PEP 8) is <strong>snake_case</strong>: lowercase words joined by underscores, like <code>student_count</code>. This differs from Java, which favours <code>camelCase</code>.</p>
<div class="callout tip"><span class="lbl">Tip</span><p>Choose names that describe the value. <code>n</code> tells a reader nothing; <code>student_count</code> tells them everything. Clear names are the cheapest documentation you will ever write.</p></div>

<h2>Python works out the type for you</h2>
<p>You never declare a type in Python. You assign a value and Python decides what it is. This is called <strong>dynamic typing</strong>. The same name can hold a number now and a string later.</p>
<pre class="code">data = 42
print(type(data))   # &lt;class 'int'&gt;

data = "forty-two"
print(type(data))   # &lt;class 'str'&gt;</pre>
<p>The <code>type()</code> function tells you what kind of value a name currently points at. In Java or C, reassigning across types like this would be a compile error; Python allows it, which is flexible but means you must keep track yourself.</p>

<h2>Assigning several names at once</h2>
<p>Python lets you assign to several names on one line, which is tidy and enables a neat swap trick.</p>
<pre class="code">x, y = 10, 20      # x becomes 10, y becomes 20
print(x, y)        # 10 20

x, y = y, x        # swap them in a single line
print(x, y)        # 20 10

a = b = 0          # give several names the same starting value
print(a, b)        # 0 0</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Using a name before assigning it. <code>print(count)</code> when <code>count</code> was never created raises a <code>NameError</code>. A name only exists after it has been assigned a value.</p></div>
`
},
{
  title:"Numbers",
  starter:'# Python integers can be as big as you like\nbig = 2 ** 100\nprint(big)\n\n# Underscores make long numbers readable\npopulation = 8_000_000\nprint(population)\n',
  html:`
<p>Python has two everyday number types: <strong>integers</strong> (whole numbers, type <code>int</code>) and <strong>floats</strong> (numbers with a decimal point, type <code>float</code>). They look similar but behave differently, and the differences catch people out.</p>

<h2>Integers can be any size</h2>
<p>In many languages an integer has a fixed size — 32 or 64 bits — and breaks if it grows too big. Python integers have <strong>no size limit</strong> at all; they grow as large as your memory allows.</p>
<pre class="code">print(2 ** 10)      # 1024
print(2 ** 100)     # 1267650600228229401496703205376</pre>
<p>That second line would overflow a normal 64-bit integer in C or Java. In Python it simply works.</p>

<h3>Writing integers clearly</h3>
<p>You can put underscores between digits to make big numbers readable. Python ignores them.</p>
<pre class="code">population = 8_000_000
print(population)   # 8000000</pre>
<p>You can also write integers in other bases: binary with <code>0b</code>, hexadecimal with <code>0x</code>, and octal with <code>0o</code>. They are all just integers underneath.</p>
<pre class="code">print(0b1010)   # 10  (binary)
print(0xFF)     # 255 (hexadecimal)
print(0o17)     # 15  (octal)</pre>

<h2>Floats and the precision trap</h2>
<p>Floats represent numbers with a fractional part. The surprise is that they cannot store most decimals exactly, because the computer keeps them in binary. This leads to a famous result.</p>
<pre class="code">print(0.1 + 0.2)          # 0.30000000000000004
print(0.1 + 0.2 == 0.3)   # False</pre>
<p>This is not a bug in Python — every language that uses standard floating-point numbers behaves this way. The value <code>0.1</code> has no exact binary form, just as one third has no exact decimal form. The tiny errors add up.</p>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Never compare floats with <code>==</code> and expect exactness. Round first, or use <code>math.isclose</code> to ask whether two floats are near enough.</p></div>
<pre class="code">import math

total = 0.1 + 0.2
print(round(total, 2))            # 0.3
print(math.isclose(total, 0.3))   # True</pre>
<div class="callout note"><span class="lbl">Note</span><p>When you need exact decimals — money is the classic case — use the <code>decimal</code> module, which stores numbers the way people write them rather than in binary.</p></div>

<h2>The arithmetic operators</h2>
<table>
<tr><th>Operator</th><th>Meaning</th><th>Example</th><th>Result</th></tr>
<tr><td><code>+</code></td><td>Add</td><td><code>5 + 2</code></td><td><code>7</code></td></tr>
<tr><td><code>-</code></td><td>Subtract</td><td><code>5 - 2</code></td><td><code>3</code></td></tr>
<tr><td><code>*</code></td><td>Multiply</td><td><code>5 * 2</code></td><td><code>10</code></td></tr>
<tr><td><code>/</code></td><td>Divide (always a float)</td><td><code>5 / 2</code></td><td><code>2.5</code></td></tr>
<tr><td><code>//</code></td><td>Floor divide (drops the remainder)</td><td><code>5 // 2</code></td><td><code>2</code></td></tr>
<tr><td><code>%</code></td><td>Modulo (the remainder)</td><td><code>5 % 2</code></td><td><code>1</code></td></tr>
<tr><td><code>**</code></td><td>Power</td><td><code>5 ** 2</code></td><td><code>25</code></td></tr>
</table>
<p>The one to remember is <code>/</code>. In Python 3, dividing with a single slash <strong>always</strong> gives a float, even when it divides evenly.</p>
<pre class="code">print(10 / 2)    # 5.0  (a float — note the .0)
print(10 // 2)   # 5    (an int)
print(10 % 3)    # 1    (what is left over)</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Dividing by zero stops your program with a <code>ZeroDivisionError</code>. There is no "infinity" result for ordinary division — you must make sure the divisor is not zero first.</p></div>

<h2>Mixing ints and floats</h2>
<p>If you combine an int and a float, Python quietly promotes the result to a float, because a float can represent anything an int can.</p>
<pre class="code">result = 4 + 2.0
print(result)        # 6.0
print(type(result))  # &lt;class 'float'&gt;</pre>
`

{
  title:"Strings",
  starter:'# Strings hold text, in single or double quotes\nname = "CadetX"\ngreeting = "Hello, " + name + "!"\nprint(greeting)\n\n# f-strings slot values straight into the text\nscore = 95\nprint(f"Your score is {score} out of 100")\n',
  html:`
<p>A <strong>string</strong> is a piece of text — a sequence of characters. You write one by wrapping text in quotes. Python accepts single or double quotes, and they behave identically, so pick one and stay consistent.</p>
<pre class="code">name = "CadetX"
tagline = 'Launch your data career'
print(name)
print(tagline)</pre>
<p>Use triple quotes when the text spans several lines.</p>
<pre class="code">message = """Dear student,
Welcome aboard.
The CadetX team"""
print(message)</pre>

<h2>Strings cannot be changed in place</h2>
<p>Strings are <strong>immutable</strong>: once created, a string can never be altered. Any operation that looks like it changes a string actually builds a brand-new string and leaves the original alone.</p>
<pre class="code">word = "cat"
# word[0] = "b"   # this would raise a TypeError
word = "bat"       # instead, point the name at a new string
print(word)        # bat</pre>
<div class="callout note"><span class="lbl">Note</span><p>Immutability is why every string method <em>returns</em> a new string instead of changing the original. If you want the change to stick, you must reassign it: <code>name = name.upper()</code>.</p></div>

<h2>Reaching into a string: indexing and slicing</h2>
<p>Each character has a position, called an <strong>index</strong>, starting at <code>0</code> — not <code>1</code>. Negative indexes count from the end, so <code>-1</code> is the last character.</p>
<pre class="code">word = "Python"
print(word[0])    # P  (first character)
print(word[5])    # n  (sixth character)
print(word[-1])   # n  (last character)</pre>
<p>A <strong>slice</strong> takes a range of characters with <code>[start:stop:step]</code>. The <code>start</code> is included but the <code>stop</code> is <em>excluded</em>.</p>
<pre class="code">text = "Programming"
print(text[0:4])   # Prog     (positions 0,1,2,3 — 4 is left out)
print(text[:4])    # Prog     (start defaults to 0)
print(text[4:])    # ramming  (stop defaults to the end)
print(text[::2])   # Pormig   (every second character)</pre>
<div class="callout note"><span class="lbl">Note</span><p>Excluding the stop looks odd at first, but it means <code>text[0:4]</code> gives exactly 4 characters, and <code>text[:n]</code> joined with <code>text[n:]</code> rebuilds the whole string with no overlap. It is a deliberate, tidy design.</p></div>

<h2>Joining, repeating and measuring</h2>
<pre class="code">first = "Cadet"
second = "X"
print(first + second)   # CadetX  (join with +)
print("ab" * 3)         # ababab  (repeat with *)
print(len("CadetX"))    # 6       (length)</pre>

<h2>f-strings: the modern way to build text</h2>
<p>Very often you want to drop a value into the middle of a sentence. The clearest way is an <strong>f-string</strong>: put <code>f</code> before the opening quote, then write <code>{ }</code> around any value you want inserted.</p>
<pre class="code">name = "CadetX"
score = 95
print(f"{name} scored {score} out of 100")
# CadetX scored 95 out of 100</pre>
<p>You can format the inserted value too. A common one is fixing the number of decimal places with <code>:.2f</code>.</p>
<pre class="code">price = 3
print(f"Total: £{price:.2f}")   # Total: £3.00</pre>
<div class="callout tip"><span class="lbl">Tip</span><p>Prefer f-strings over gluing pieces with <code>+</code>. They are shorter, read like the final sentence, and avoid the "cannot join text and number" error you get from <code>+</code>.</p></div>

<h2>Useful string methods</h2>
<p>Methods are actions you call on a string with a dot. Because strings are immutable, each one returns a new string.</p>
<table>
<tr><th>Method</th><th>What it does</th><th>Example → result</th></tr>
<tr><td><code>.upper()</code></td><td>Uppercase copy</td><td><code>"hi".upper()</code> → <code>"HI"</code></td></tr>
<tr><td><code>.lower()</code></td><td>Lowercase copy</td><td><code>"HI".lower()</code> → <code>"hi"</code></td></tr>
<tr><td><code>.strip()</code></td><td>Trim surrounding spaces</td><td><code>" hi ".strip()</code> → <code>"hi"</code></td></tr>
<tr><td><code>.replace(a, b)</code></td><td>Swap text for other text</td><td><code>"cat".replace("c","b")</code> → <code>"bat"</code></td></tr>
<tr><td><code>.split(sep)</code></td><td>Break into a list</td><td><code>"a,b".split(",")</code> → <code>["a","b"]</code></td></tr>
</table>

<h2>Escape sequences</h2>
<p>Some characters are hard to type inside a string, so Python uses a backslash to represent them.</p>
<table>
<tr><th>Sequence</th><th>Meaning</th></tr>
<tr><td><code>\\n</code></td><td>New line</td></tr>
<tr><td><code>\\t</code></td><td>Tab</td></tr>
<tr><td><code>\\"</code></td><td>A double quote inside double quotes</td></tr>
<tr><td><code>\\\\</code></td><td>A single backslash</td></tr>
</table>
<pre class="code">print("Line one\\nLine two")
# Line one
# Line two</pre>
<p>If you want the backslashes taken literally — file paths are the usual reason — put <code>r</code> before the string to make a <strong>raw string</strong>.</p>
<pre class="code">print(r"C:\\Users\\data")   # C:\\Users\\data</pre>
`

  starter:'# Booleans are either True or False (note the capitals)\nis_enrolled = True\nhas_paid = False\nprint(is_enrolled)\nprint(is_enrolled and has_paid)\n\n# Convert between types explicitly\nage_text = "30"\nage = int(age_text)\nprint(age + 1)\n',

<p>A <strong>Boolean</strong> is the simplest type of all: it is either <code>True</code> or <code>False</code>. Booleans are how a program answers yes/no questions, and they are what every comparison produces.</p>
<pre class="code">is_enrolled = True
has_paid = False
print(5 &gt; 3)     # True
print(5 == 3)    # False</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>The values are <code>True</code> and <code>False</code> with a capital first letter. Writing <code>true</code> or <code>false</code> in lowercase gives a <code>NameError</code>, because Python thinks you are naming a variable that does not exist. This catches people coming from Java or JavaScript.</p></div>

<h2>Booleans are secretly numbers</h2>
<p>Under the hood, <code>True</code> equals <code>1</code> and <code>False</code> equals <code>0</code>. You can even do arithmetic with them, which is occasionally handy for counting.</p>
<pre class="code">print(True + True)    # 2
print(False + 5)      # 5</pre>

<h2>Truthiness: every value is either "truthy" or "falsy"</h2>
<p>Python can treat <em>any</em> value as a Boolean when it needs to. Most values count as <code>True</code>, but a short, specific list counts as <code>False</code>. These are the <strong>falsy</strong> values.</p>
<table>
<tr><th>Counts as False</th><th>Counts as True</th></tr>
<tr><td><code>0</code>, <code>0.0</code></td><td>any other number</td></tr>
<tr><td><code>""</code> (empty string)</td><td>any non-empty string</td></tr>
<tr><td><code>[]</code>, <code>{}</code> (empty collections)</td><td>any non-empty collection</td></tr>
<tr><td><code>None</code>, <code>False</code></td><td>most other things</td></tr>
</table>
<p>The <code>bool()</code> function shows you how any value is judged.</p>
<pre class="code">print(bool(0))      # False
print(bool(""))     # False
print(bool("hi"))   # True
print(bool(42))     # True</pre>
<div class="callout note"><span class="lbl">Note</span><p>This is why you will later be able to write <code>if name:</code> to mean "if name is not empty". You are relying on truthiness — one of Python's most useful shortcuts.</p></div>

<h2>Changing one type into another</h2>
<p>Turning a value of one type into another is called <strong>type conversion</strong> or <strong>casting</strong>. You do it by calling the type name like a function.</p>
<pre class="code">print(int("42"))     # 42     (string to int)
print(float("3.5"))  # 3.5    (string to float)
print(str(100))      # "100"  (number to string)
print(int(3.9))      # 3      (float to int — it truncates)</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Converting <code>int(3.9)</code> gives <code>3</code>, not <code>4</code> — it chops off the decimal part rather than rounding. Use <code>round(3.9)</code> if you want <code>4</code>.</p></div>
<p>Conversion only works when the text makes sense as that number. <code>int("abc")</code> raises a <code>ValueError</code>, and so does <code>int("3.5")</code> — you cannot jump straight from a decimal string to an int.</p>

<h2>Python will not mix text and numbers for you</h2>
<p>Unlike JavaScript, Python refuses to join a string and a number automatically. You must convert first.</p>
<pre class="code">age = 30
# print("Age: " + age)      # TypeError: can only join str to str
print("Age: " + str(age))    # Age: 30
print(f"Age: {age}")         # Age: 30  (the tidy way)</pre>
<div class="callout tip"><span class="lbl">Tip</span><p>This strictness is a feature, not an annoyance. Languages that guess how to mix types produce silent, confusing bugs. Python makes you say what you mean, so an f-string or an explicit <code>str()</code> is the fix.</p></div>
`

/* ════════════════════ SYNTAX HIGHLIGHTER ════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(code){
  code = esc(code);
  const store=[];
  code = code.replace(/#[^\n]*/g, m=>{store.push('<span class="c">'+m+'</span>');return '\u0000';});
  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m=>{store.push('<span class="s">'+m+'</span>');return '\u0000';});
  code = code.replace(/\b\d+\.?\d*\b/g, '<span class="n">$&</span>');
  const kw=['def','return','if','elif','else','for','while','in','and','or','not','is','print','True','False','None','import','from','as','class','with','break','continue','pass','lambda','input','range','len','str','int','float'];
  code = code.replace(new RegExp('\\b('+kw.join('|')+')\\b','g'), '<span class="k">$1</span>');
  let k=0; code = code.replace(/\u0000/g, ()=>store[k++]);
  return code;
}

const flat=[{type:"lesson",i:0},{type:"lesson",i:1},{type:"lesson",i:2},{type:"lesson",i:3},{type:"tasks"}];
let cur=0, tab='lesson';

function buildNav(filter=""){
  const f=filter.trim().toLowerCase();
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(sec=>{
    const wrap=document.createElement('div'); wrap.className='nav-section';
    const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=sec.label; wrap.appendChild(lbl);
    let shown=0;
    sec.items.forEach(it=>{
      if(f && !it.label.toLowerCase().includes(f)) return;
      shown++;
      const el=document.createElement('div');
      el.className='nav-item'+(it.type==='tasks'?' task':'')+(sec.locked?' locked':'');
      const isActive = !sec.locked && ((it.type==='lesson'&&flat[cur].type==='lesson'&&flat[cur].i===it.i)||(it.type==='tasks'&&flat[cur].type==='tasks'));
      if(isActive) el.classList.add('active');
      let inner = it.type==='tasks'
        ? '<span class="file-ic">📄</span>'+it.label+'<span class="count">'+it.count+'</span>'
        : '<span class="dot"></span>'+it.label;
      if(sec.locked) inner += '<span class="count" style="margin-left:auto">🔒</span>';
      el.innerHTML=inner;
      if(!sec.locked){
        el.onclick=()=>{
          cur = it.type==='tasks' ? flat.length-1 : it.i;
          tab='lesson'; render();
        };
      } else { el.title='Available in the full Part 1 build'; }
      wrap.appendChild(el);
    });
    if(shown>0) nav.appendChild(wrap);
  });
}

/* ════════════════════ EDITOR ════════════════════ */
function updateGutter(){
  const ed=document.getElementById('editor');
  const lines=ed.value.split('\n').length;
  let g=''; for(let i=1;i<=lines;i++) g+=i+'\n';
  document.getElementById('gutter').textContent=g.trim();
}
const editor=document.getElementById('editor');
editor.addEventListener('input',updateGutter);
editor.addEventListener('scroll',()=>{document.getElementById('gutter').scrollTop=editor.scrollTop;});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateGutter();
  }
});

function runCode(){

    out.innerHTML='<span class="out-hint">▸ The Python engine is still loading. Give it a moment and try again.</span>';
    return;
  }
  const code=document.getElementById('editor').value;
  out.innerHTML=''; let buf='';
  const write=t=>{buf+=t; out.innerHTML='<span class="out-ok">'+esc(buf)+'</span>'; out.scrollTop=out.scrollHeight;};
  const readf=x=>{ if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined) throw "File not found: '"+x+"'"; return Sk.builtinFiles["files"][x]; };
  Sk.configure({output:write, read:readf, __future__:Sk.python3, execLimit:10000});
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{ if(!buf) out.innerHTML='<span class="out-hint">▸ Program finished with no output.</span>'; },
          err=>{ out.innerHTML='<span class="out-err">'+esc(err.toString())+'</span>'; });
}
document.getElementById('run').onclick=runCode;
document.getElementById('reset').onclick=()=>{
  const item=flat[cur];
  document.getElementById('editor').value = item.type==='lesson' ? LESSONS[item.i].starter : '# Use this editor to solve any task above.\n\n';
  document.getElementById('output').innerHTML='<span class="out-hint">▸ Code reset.</span>';
  updateGutter();
};

/* ════════════════════ WIRING ════════════════════ */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ tab=t.dataset.tab; render(); });
document.getElementById('prev').onclick=()=>{ if(cur>0){cur--;tab='lesson';render();} };
document.getElementById('next').onclick=()=>{ if(cur<flat.length-1){cur++;tab='lesson';render();} };
document.getElementById('search').addEventListener('input',e=>buildNav(e.target.value));

buildNav();
render();
</script>
</body>
</html>
