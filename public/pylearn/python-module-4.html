  --amber:#c97a12;

  --info:#3563b0;
  --kw:#3355c8;

html,body{margin:0;height:100%}
body{

::-webkit-scrollbar{width:10px;height:10px}

.topbar{
  height:64px;flex:0 0 64px;
  display:flex;align-items:center;gap:18px;
  padding:0 22px;
  background:linear-gradient(90deg,var(--navy) 0%,var(--plum) 55%,var(--crimson) 100%);
  border-bottom:1px solid rgba(0,0,0,.22);
  z-index:10;
}
.brand{display:flex;align-items:center;gap:12px}
.logo-pill{
  background:#fff;border-radius:999px;
  padding:6px 14px 7px;
  display:flex;align-items:center;line-height:1;
  font-weight:800;font-size:15px;letter-spacing:-.2px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.logo-cadet{color:var(--navy)}
.logo-x{color:var(--crimson)}
.brand-name{font-weight:700;font-size:16px;letter-spacing:.2px;color:#fff}

  background:rgba(255,255,255,.14);

}

.layout{flex:1;display:flex;min-height:0}

.sidebar{

  overflow-y:auto;
  padding:14px 12px 40px;
}
.search{

  background:var(--panel);

.search input::placeholder{color:var(--muted-2)}

}
.nav-section{margin-bottom:6px}
.nav-label{
  font-size:11px;font-weight:600;letter-spacing:.6px;

<script>
/* ════════════════════ CONTENT ════════════════════ */
const LESSONS = [
{
  title:"Conditional Statements",
  starter:'# An if statement runs code only when a condition is True\ntemperature = 28\n\nif temperature > 25:\n    print("It is warm today")\n    print("Wear something light")\nelse:\n    print("Bring a jacket")\n',
  html:`
<p>So far your programs have run every line, top to bottom, no matter what. A <strong>conditional</strong> changes that: it lets a program choose whether to run a block of code, based on whether something is true. This is where code starts making decisions.</p>

<h2>The if statement</h2>
<p>An <code>if</code> statement has three parts: the keyword <code>if</code>, a condition that is either true or false, and a colon. The indented block below it runs only when the condition is true.</p>
<pre class="code">temperature = 28

if temperature &gt; 25:
    print("It is warm today")   # runs only when the condition holds</pre>
<p>Remember from Module 1 that the <strong>indentation is what defines the block</strong>. Every line indented under the <code>if</code> belongs to it; the first line back at the left margin is outside it and always runs.</p>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Two things trip people up here: forgetting the colon at the end of the <code>if</code> line (a <code>SyntaxError</code>), and using a single <code>=</code> instead of <code>==</code> inside the condition. <code>if score = 10:</code> is an error; you meant <code>if score == 10:</code>.</p></div>

<h2>else: the other path</h2>
<p><code>else</code> gives a block to run when the condition is false. There is no condition on an <code>else</code> — it simply catches everything the <code>if</code> did not.</p>
<pre class="code">age = 15

if age &gt;= 18:
    print("You may enrol directly")
else:
    print("You need parental consent")</pre>

<h2>elif: choosing between many options</h2>
<p>When there are several possibilities, use <code>elif</code> (short for "else if"). Python checks each condition in order and runs the block for the <strong>first</strong> one that is true, then skips all the rest.</p>
<pre class="code">score = 72

if score &gt;= 70:
    print("Distinction")
elif score &gt;= 50:
    print("Pass")
else:
    print("Needs improvement")</pre>
<div class="callout note"><span class="lbl">Note</span><p>Order matters. Because only the first true branch runs, put the strictest condition first. If you tested <code>score &gt;= 50</code> before <code>score &gt;= 70</code>, a score of 72 would match the 50 branch and never reach the 70 one.</p></div>
<p>Python has no <code>switch</code> statement like C or Java. The <code>if</code>/<code>elif</code>/<code>else</code> chain is the standard tool. (Newer Python has a <code>match</code> statement for advanced pattern work, but you will not need it yet.)</p>

<h2>Testing truthiness directly</h2>
<p>Recall from Module 2 that every value is truthy or falsy. You can put a value straight into an <code>if</code> without comparing it to anything.</p>
<pre class="code">name = ""

if name:
    print(f"Hello, {name}")
else:
    print("No name was given")   # empty string is falsy, so this runs</pre>

<h2>A one-line choice</h2>
<p>When you just need to pick between two values, Python offers a compact <strong>conditional expression</strong>: <code>A if condition else B</code>.</p>
<pre class="code">score = 45
result = "pass" if score &gt;= 50 else "fail"
print(result)   # fail</pre>
`
},
{
  title:"The for Loop",
  starter:'# A for loop repeats once for each item in a sequence\nfor colour in ["red", "green", "blue"]:\n    print(colour)\n\n# range() generates numbers to loop over\nfor number in range(1, 6):\n    print(number)\n',
  html:`
<p>A <strong>loop</strong> repeats a block of code. The <code>for</code> loop repeats it once for each item in a sequence — each character in a string, each item in a list, each number in a range. It saves you from writing the same line many times over.</p>

<h2>Looping over a sequence</h2>
<p>The shape is <code>for &lt;name&gt; in &lt;sequence&gt;:</code>. On each pass, the name is set to the next item, and the indented block runs.</p>
<pre class="code">for colour in ["red", "green", "blue"]:
    print(colour)
# red
# green
# blue</pre>
<p>This is a <em>for-each</em> loop. Unlike C's <code>for (i = 0; i &lt; n; i++)</code>, you do not manage a counter by hand — Python hands you each item directly.</p>

<h2>Counting with range()</h2>
<p>To loop a set number of times, use <code>range()</code>, which produces a sequence of numbers. It comes in three forms.</p>
<table>
<tr><th>Call</th><th>Produces</th></tr>
<tr><td><code>range(5)</code></td><td>0, 1, 2, 3, 4</td></tr>
<tr><td><code>range(2, 6)</code></td><td>2, 3, 4, 5</td></tr>
<tr><td><code>range(0, 10, 2)</code></td><td>0, 2, 4, 6, 8</td></tr>
</table>
<pre class="code">for number in range(1, 6):
    print(number)
# 1 2 3 4 5  (each on its own line)</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>The <code>stop</code> value is <strong>excluded</strong>, just like string slicing in Module 2. <code>range(1, 6)</code> stops at 5, not 6. To count 1 through 6, write <code>range(1, 7)</code>.</p></div>

<h2>Looping over the characters of a string</h2>
<pre class="code">for letter in "Cadet":
    print(letter)
# C a d e t  (one per line)</pre>

<h2>Getting the position too: enumerate()</h2>
<p>Sometimes you want the item <em>and</em> its position. <code>enumerate()</code> gives you both, so you do not have to track an index by hand.</p>
<pre class="code">colours = ["red", "green", "blue"]
for index, colour in enumerate(colours):
    print(index, colour)
# 0 red
# 1 green
# 2 blue</pre>

<h2>Building up a result</h2>
<p>A very common pattern is to start a total at zero and add to it on each pass. This is called an <strong>accumulator</strong>.</p>
<pre class="code">total = 0
for number in range(1, 6):
    total += number      # add each number to the running total
print(total)             # 15  (1+2+3+4+5)</pre>
`

{
  title:"The while Loop",
  starter:'# A while loop repeats as long as its condition stays True\ncount = 5\n\nwhile count > 0:\n    print(count)\n    count -= 1      # move towards ending the loop\n\nprint("Lift off!")\n',
  html:`
<p>The <code>for</code> loop repeats a known number of times. The <code>while</code> loop is different: it repeats <strong>as long as a condition stays true</strong>, however many times that turns out to be. You reach for it when you do not know the count in advance.</p>

<h2>How a while loop works</h2>
<p>Python checks the condition. If it is true, it runs the block, then checks the condition again. It keeps going until the condition becomes false.</p>
<pre class="code">count = 5

while count &gt; 0:
    print(count)
    count -= 1      # this is what eventually ends the loop

print("Lift off!")
# 5 4 3 2 1 Lift off!</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>You must change something inside the loop that moves the condition towards false. Forget the <code>count -= 1</code> above and <code>count</code> stays 5 forever — an <strong>infinite loop</strong> that never stops. If a program hangs, a while loop with no exit is the usual cause.</p></div>

<h2>Looping until something happens</h2>
<p>Because the number of repeats is not fixed, <code>while</code> suits "keep going until…" situations. Here we double a number until it passes 100.</p>
<pre class="code">value = 1

while value &lt; 100:
    value *= 2
print(value)   # 128  (the first power of two above 100)</pre>

<h2>for or while?</h2>
<table>
<tr><th>Use a for loop when…</th><th>Use a while loop when…</th></tr>
<tr><td>you have a sequence to go through</td><td>you loop until a condition changes</td></tr>
<tr><td>you know how many times to repeat</td><td>you do not know the count in advance</td></tr>
</table>
<div class="callout tip"><span class="lbl">Tip</span><p>If you catch yourself creating a counter and increasing it by one each pass inside a while loop, a <code>for</code> loop with <code>range()</code> is usually cleaner and safer.</p></div>
`

{
  title:"break, continue & Loop else",
  starter:'# break leaves a loop early; continue skips to the next pass\nfor number in range(1, 11):\n    if number == 7:\n        break            # stop the whole loop at 7\n    if number % 2 == 0:\n        continue         # skip even numbers\n    print(number)        # 1 3 5\n',
  html:`
<p>Two keywords give you finer control inside any loop: <code>break</code> stops the loop completely, and <code>continue</code> skips the rest of the current pass and moves on to the next. Python also has an unusual <code>else</code> on loops, which this lesson explains.</p>

<h2>break: stop early</h2>
<p><code>break</code> exits the loop immediately, even if there are items left. Everything after the loop then carries on as normal.</p>
<pre class="code">for number in range(1, 100):
    if number == 5:
        break            # leave the loop the moment we hit 5
    print(number)
# 1 2 3 4</pre>

<h2>continue: skip this one</h2>
<p><code>continue</code> abandons the current pass and jumps straight to the next item. The loop itself keeps going.</p>
<pre class="code">for number in range(1, 7):
    if number % 2 == 0:
        continue         # skip the even numbers
    print(number)
# 1 3 5</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Mixing up the two. <code>break</code> ends the <em>entire</em> loop; <code>continue</code> ends only the <em>current</em> pass. Reach for <code>continue</code> when you want to ignore some items, and <code>break</code> when you are finished altogether.</p></div>

<h2>The loop else clause</h2>
<p>Loops can have an <code>else</code> block. It is unusual and often misunderstood: the <code>else</code> runs <strong>only if the loop finished normally</strong>, without hitting a <code>break</code>. It is handy for "I checked everything and found nothing" situations.</p>
<pre class="code">target = 8

for number in [2, 4, 6]:
    if number == target:
        print("Found it")
        break
else:
    print("Not found")   # runs because the loop never broke
# Not found</pre>
<div class="callout note"><span class="lbl">Note</span><p>Read the loop <code>else</code> as "no break". If the loop reaches the end without a <code>break</code>, the <code>else</code> runs. If a <code>break</code> fired, the <code>else</code> is skipped. This behaviour is unique to Python — most languages have nothing like it.</p></div>

<h2>pass: do nothing on purpose</h2>
<p><code>pass</code> is a placeholder that does nothing at all. You use it when the syntax needs a block but you have no code to put there yet.</p>
<pre class="code">for number in range(3):
    pass   # nothing to do yet, but the loop still needs a body
print("Done")</pre>

/* ════════════════════ SYNTAX HIGHLIGHTER ════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(code){
  code = esc(code);
  const store=[];
  code = code.replace(/#[^\n]*/g, m=>{store.push('<span class="c">'+m+'</span>');return '\u0000';});
  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m=>{store.push('<span class="s">'+m+'</span>');return '\u0000';});
  code = code.replace(/\b\d+\.?\d*\b/g, '<span class="n">$&</span>');
  const kw=['def','return','if','elif','else','for','while','in','and','or','not','is','print','True','False','None','import','from','as','class','with','break','continue','pass','lambda','input','range','len','str','int','float'];
  code = code.replace(new RegExp('\\b('+kw.join('|')+')\\b','g'), '<span class="k">$1</span>');
  let k=0; code = code.replace(/\u0000/g, ()=>store[k++]);
  return code;
}

/* ════════════════════ STATE + RENDER ════════════════════ */
const flat=[{type:"lesson",i:0},{type:"lesson",i:1},{type:"lesson",i:2},{type:"lesson",i:3},{type:"tasks"}];
let cur=0, tab='lesson';

function buildNav(filter=""){
  const f=filter.trim().toLowerCase();
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(sec=>{
    const wrap=document.createElement('div'); wrap.className='nav-section';
    const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=sec.label; wrap.appendChild(lbl);
    let shown=0;
    sec.items.forEach(it=>{
      if(f && !it.label.toLowerCase().includes(f)) return;
      shown++;
      const el=document.createElement('div');
      el.className='nav-item'+(it.type==='tasks'?' task':'')+(sec.locked?' locked':'');
      const isActive = !sec.locked && ((it.type==='lesson'&&flat[cur].type==='lesson'&&flat[cur].i===it.i)||(it.type==='tasks'&&flat[cur].type==='tasks'));
      if(isActive) el.classList.add('active');
      let inner = it.type==='tasks'
        ? '<span class="file-ic">📄</span>'+it.label+'<span class="count">'+it.count+'</span>'
        : '<span class="dot"></span>'+it.label;
      if(sec.locked) inner += '<span class="count" style="margin-left:auto">🔒</span>';
      el.innerHTML=inner;
      if(!sec.locked){
        el.onclick=()=>{
          cur = it.type==='tasks' ? flat.length-1 : it.i;
          tab='lesson'; render();
        };
      } else { el.title='Available in the full Part 1 build'; }
      wrap.appendChild(el);
    });
    if(shown>0) nav.appendChild(wrap);
  });
}

function render(){
  const item=flat[cur];
  const lessonView=document.getElementById('lesson-view');
  const ideView=document.getElementById('ide-view');

  if(item.type==='lesson'){
    const L=LESSONS[item.i];
    document.getElementById('crumb').textContent='4. Control Flow';
    document.getElementById('title').textContent=L.title;
    lessonView.innerHTML=L.html;
    document.getElementById('editor').value=L.starter;
    document.getElementById('tab-ide').style.display='';
  } else {
    document.getElementById('crumb').textContent='4. Control Flow';
    document.getElementById('title').textContent='Module 1 Tasks';
    lessonView.innerHTML=renderTasks();
    document.getElementById('editor').value='# Use this editor to solve any task above.\n# Type your code, then press Run code.\n\n';
    document.getElementById('tab-ide').style.display='';
  }

  // highlight static lesson code blocks
  lessonView.querySelectorAll('pre.code').forEach(pre=>{ pre.innerHTML='<code>'+highlight(pre.textContent)+'</code>'; });

  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  lessonView.style.display = tab==='lesson' ? 'block' : 'none';
  ideView.classList.toggle('show', tab==='ide');
  updateGutter();

  // arrows
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===flat.length-1;

  buildNav(document.getElementById('search').value);
  document.querySelector('.content-wrap').scrollTop=0;
}

function renderTasks(){
  let h='<p class="tasks-intro">Work through these in order — they start very simple and build up. Try each one in the <strong>Try it yourself</strong> tab before revealing the solution.</p>';
  TASKS.forEach((t,idx)=>{
    h+='<div class="task"><div class="task-head"><div class="task-num">'+(idx+1)+'</div><div class="task-text">'+t.p+'</div></div>'+
       '<details><summary><span class="chev">▸</span> Show solution</summary><div class="task-sol">'+
       '<pre class="code"><code>'+highlight(t.c)+'</code></pre><div class="sol-note">'+t.e+'</div></div></details></div>';
  });
  return h;
}

/* ════════════════════ EDITOR ════════════════════ */
function updateGutter(){
  const ed=document.getElementById('editor');
  const lines=ed.value.split('\n').length;
  let g=''; for(let i=1;i<=lines;i++) g+=i+'\n';
  document.getElementById('gutter').textContent=g.trim();
}
const editor=document.getElementById('editor');
editor.addEventListener('input',updateGutter);
editor.addEventListener('scroll',()=>{document.getElementById('gutter').scrollTop=editor.scrollTop;});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateGutter();
  }
});

/* ════════════════════ RUN (Skulpt) ════════════════════ */
function runCode(){
  const out=document.getElementById('output');
  if(typeof Sk==='undefined'){
    out.innerHTML='<span class="out-hint">▸ The Python engine is still loading. Give it a moment and try again.</span>';
    return;
  }
  const code=document.getElementById('editor').value;
  out.innerHTML=''; let buf='';
  const write=t=>{buf+=t; out.innerHTML='<span class="out-ok">'+esc(buf)+'</span>'; out.scrollTop=out.scrollHeight;};
  const readf=x=>{ if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined) throw "File not found: '"+x+"'"; return Sk.builtinFiles["files"][x]; };
  Sk.configure({output:write, read:readf, __future__:Sk.python3, execLimit:10000});
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{ if(!buf) out.innerHTML='<span class="out-hint">▸ Program finished with no output.</span>'; },
          err=>{ out.innerHTML='<span class="out-err">'+esc(err.toString())+'</span>'; });
}
document.getElementById('run').onclick=runCode;
document.getElementById('reset').onclick=()=>{
  const item=flat[cur];
  document.getElementById('editor').value = item.type==='lesson' ? LESSONS[item.i].starter : '# Use this editor to solve any task above.\n\n';
  document.getElementById('output').innerHTML='<span class="out-hint">▸ Code reset.</span>';
  updateGutter();
};
