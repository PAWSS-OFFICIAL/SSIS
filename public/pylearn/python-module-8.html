<script>
/* ════════════════════ CONTENT ════════════════════ */
const LESSONS = [
{
  title:"Inheritance",
  starter:'# A child class inherits everything from its parent\nclass Animal:\n    def __init__(self, name):\n        self.name = name\n\n    def eat(self):\n        print(f"{self.name} is eating")\n\nclass Dog(Animal):     # Dog is an Animal\n    def bark(self):\n        print(f"{self.name} says Woof!")\n\nrex = Dog("Rex")\nrex.eat()    # inherited from Animal\nrex.bark()   # defined on Dog\n',
  html:`
<p>In Module 7 each class stood alone. Real programs often have classes that are variations on a theme — a dog and a cat are both animals. <strong>Inheritance</strong> lets one class build on another, taking all of its data and behaviour for free and adding its own on top. It saves you from writing the same code twice.</p>

<h2>Parent and child classes</h2>
<p>The class you build on is the <strong>parent</strong> (or base class); the class that builds on it is the <strong>child</strong> (or subclass). You create a child by putting the parent's name in brackets after the child's name.</p>
<pre class="code">class Animal:
    def __init__(self, name):
        self.name = name

    def eat(self):
        print(f"{self.name} is eating")

class Dog(Animal):          # Dog inherits from Animal
    def bark(self):
        print(f"{self.name} says Woof!")

rex = Dog("Rex")
rex.eat()     # Rex is eating   — inherited from Animal
rex.bark()    # Rex says Woof!  — Dog's own method</pre>
<p>Notice <code>Dog</code> never defines <code>__init__</code> or <code>eat</code>, yet <code>rex</code> can use both. It received them from <code>Animal</code>. This relationship is often described as "is-a": a dog <em>is an</em> animal.</p>
<div class="callout note"><span class="lbl">Note</span><p>A child can add brand-new methods (like <code>bark</code>) that the parent knows nothing about. Inheritance flows one way: the child gets everything from the parent, but the parent never gains the child's extras.</p></div>

<h2>Building a family of classes</h2>
<p>Many children can share one parent, each adding its own behaviour while reusing the common parts.</p>
<pre class="code">class Animal:
    def __init__(self, name):
        self.name = name

class Dog(Animal):
    def speak(self):
        print(f"{self.name}: Woof")

class Cat(Animal):
    def speak(self):
        print(f"{self.name}: Meow")

Dog("Rex").speak()    # Rex: Woof
Cat("Bella").speak()  # Bella: Meow</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>Do not reach for inheritance just to reuse a bit of code. Use it only when the child genuinely <em>is a kind of</em> the parent. If the relationship is really "has-a" (a car has an engine), store the other object as an attribute instead.</p></div>
`
},
{
  title:"Overriding & super()",
  starter:'# A child can replace a parent method, and still call the original\nclass Animal:\n    def __init__(self, name):\n        self.name = name\n\n    def speak(self):\n        print(f"{self.name} makes a sound")\n\nclass Dog(Animal):\n    def speak(self):                 # override the parent version\n        print(f"{self.name} says Woof!")\n\nAnimal("Thing").speak()   # Thing makes a sound\nDog("Rex").speak()        # Rex says Woof!\n',
  html:`
<p>A child inherits its parent's methods, but it does not have to keep them as they are. <strong>Overriding</strong> means defining a method in the child with the same name as one in the parent — the child's version then takes over. And <code>super()</code> lets the child still reach the parent's original version when it needs to.</p>

<h2>Overriding a method</h2>
<p>When a child defines a method that already exists on the parent, Python uses the child's version for child objects. The parent is unchanged for its own objects.</p>
<pre class="code">class Animal:
    def speak(self):
        print("Some generic sound")

class Dog(Animal):
    def speak(self):                # this replaces Animal.speak for dogs
        print("Woof!")

Animal().speak()   # Some generic sound
Dog().speak()      # Woof!</pre>

<h2>Calling the parent with super()</h2>
<p>Often you do not want to replace the parent's method entirely — you want to <em>extend</em> it. <code>super()</code> gives you access to the parent, so you can run its version and then add more. This is most common in <code>__init__</code>.</p>
<pre class="code">class Animal:
    def __init__(self, name):
        self.name = name

class Dog(Animal):
    def __init__(self, name, breed):
        super().__init__(name)      # let Animal set up name
        self.breed = breed          # then add Dog's own attribute

rex = Dog("Rex", "Labrador")
print(rex.name)    # Rex     (set by Animal via super)
print(rex.breed)   # Labrador (set by Dog)</pre>
<div class="callout warn"><span class="lbl">Common mistake</span><p>If a child defines its own <code>__init__</code> and forgets to call <code>super().__init__(...)</code>, the parent's setup never runs, so attributes like <code>self.name</code> are never created — and reading them later raises an <code>AttributeError</code>.</p></div>
<div class="callout note"><span class="lbl">Note</span><p>Read <code>super()</code> as "the parent version of this". You can use it with any method, not just <code>__init__</code>, whenever you want to build on what the parent already does rather than throw it away.</p></div>
`
},
{
  title:"Encapsulation",
  starter:'# A leading underscore signals "internal, please do not touch"\nclass Account:\n    def __init__(self, balance):\n        self._balance = balance      # meant to be private\n\n    def deposit(self, amount):\n        if amount > 0:\n            self._balance += amount\n\n    def get_balance(self):\n        return self._balance\n\nacc = Account(100)\nacc.deposit(50)\nprint(acc.get_balance())   # 150\n',
  html:`
<p><strong>Encapsulation</strong> means keeping an object's data safely inside it and controlling how the outside world touches that data. Instead of letting any code change any attribute directly, you expose methods that guard the rules. It stops objects being put into invalid states.</p>

<h2>The problem with wide-open attributes</h2>
<p>Every attribute you have made so far is fully public — anyone can set it to anything, including nonsense.</p>
<pre class="code">class Account:
    def __init__(self, balance):
        self.balance = balance

acc = Account(100)
acc.balance = -9999      # nothing stops this bad value
print(acc.balance)       # -9999</pre>

<h2>Signalling "internal" with an underscore</h2>
<p>Python does not have strict private variables like Java. Instead there is a strong convention: a name beginning with a single underscore, like <code>_balance</code>, means "this is internal — do not touch it from outside". It is a polite "keep out" sign that other programmers respect.</p>
<pre class="code">class Account:
    def __init__(self, balance):
        self._balance = balance          # internal by convention

    def deposit(self, amount):
        if amount &gt; 0:                    # guard the rule
            self._balance += amount

    def get_balance(self):
        return self._balance

acc = Account(100)
acc.deposit(50)
# acc.deposit(-50)  -> ignored by the guard
print(acc.get_balance())   # 150</pre>
<div class="callout note"><span class="lbl">Note</span><p>The single underscore is a convention, not a lock — Python will still let you reach <code>acc._balance</code> if you insist. A double leading underscore (<code>__balance</code>) makes it harder to reach by accident through a mechanism called name mangling, but the everyday tool is the single underscore plus well-designed methods.</p></div>

<h2>Controlling access with properties</h2>
<p>Sometimes you want an attribute to look normal from outside but run checks when it is read or set. The <code>@property</code> decorator turns a method into something you access like an attribute.</p>
<pre class="code">class Circle:
    def __init__(self, radius):
        self._radius = radius

    @property
    def radius(self):
        return self._radius

    @property
    def area(self):
        return 3.14159 * self._radius ** 2

c = Circle(5)
print(c.radius)   # 5    — called like an attribute, no brackets
print(c.area)     # 78.53975 — computed on the fly</pre>
<div class="callout tip"><span class="lbl">Tip</span><p>Start simple. Plain attributes are fine for most classes. Reach for underscores and properties when an attribute has rules to enforce or a value that should be computed rather than stored.</p></div>
`
},
{
  title:"Polymorphism",
  starter:'# The same method name behaves correctly for each type\nclass Dog:\n    def speak(self):\n        return "Woof"\n\nclass Cat:\n    def speak(self):\n        return "Meow"\n\nfor animal in [Dog(), Cat(), Dog()]:\n    print(animal.speak())   # Woof, Meow, Woof\n',
  html:`
<p><strong>Polymorphism</strong> is a long word for a simple, powerful idea: the same method call can do the right thing for different types of object. If several classes each provide a method with the same name, your code can call it without caring which class it is dealing with.</p>

<h2>One call, many behaviours</h2>
<p>Because both classes below have a <code>speak</code> method, the loop can treat them the same. Each object responds in its own way.</p>
<pre class="code">class Dog:
    def speak(self):
        return "Woof"

class Cat:
    def speak(self):
        return "Meow"

class Cow:
    def speak(self):
        return "Moo"

for animal in [Dog(), Cat(), Cow()]:
    print(animal.speak())
# Woof
# Meow
# Moo</pre>
<p>The loop never checks the type. It simply trusts that each object has a <code>speak</code> method and calls it. Adding a new animal class later needs no change to the loop at all.</p>

<h2>Duck typing</h2>
<p>Python takes this further with an idea nicknamed <strong>duck typing</strong>: "if it walks like a duck and quacks like a duck, treat it as a duck". Python does not care what class an object is — only whether it has the method you are calling.</p>
<pre class="code">class Duck:
    def quack(self):
        print("Quack")

class Person:
    def quack(self):
        print("I am imitating a duck")

def make_it_quack(thing):
    thing.quack()      # works on anything that has a quack method

make_it_quack(Duck())     # Quack
make_it_quack(Person())   # I am imitating a duck</pre>
<div class="callout note"><span class="lbl">Note</span><p>Polymorphism works beautifully with inheritance: give each child its own version of a shared method (like the <code>speak</code> override in the previous lesson), then loop over a mixed list of them and call that method on each.</p></div>
<div class="callout warn"><span class="lbl">Common mistake</span><p>If you loop over mixed objects and call a method that one of them does not have, you get an <code>AttributeError</code>. Polymorphism relies on every object in the group actually providing the method you call.</p></div>
`

/* ════════════════════ SYNTAX HIGHLIGHTER ════════════════════ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(code){
  code = esc(code);
  const store=[];
  code = code.replace(/#[^\n]*/g, m=>{store.push('<span class="c">'+m+'</span>');return '\u0000';});
  code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, m=>{store.push('<span class="s">'+m+'</span>');return '\u0000';});
  code = code.replace(/\b\d+\.?\d*\b/g, '<span class="n">$&</span>');
  const kw=['def','return','if','elif','else','for','while','in','and','or','not','is','print','True','False','None','import','from','as','class','with','break','continue','pass','lambda','input','range','len','str','int','float'];
  code = code.replace(new RegExp('\\b('+kw.join('|')+')\\b','g'), '<span class="k">$1</span>');
  let k=0; code = code.replace(/\u0000/g, ()=>store[k++]);
  return code;
}

/* ════════════════════ STATE + RENDER ════════════════════ */
const flat=[{type:"lesson",i:0},{type:"lesson",i:1},{type:"lesson",i:2},{type:"lesson",i:3},{type:"tasks"}];
let cur=0, tab='lesson';

function buildNav(filter=""){
  const f=filter.trim().toLowerCase();
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(sec=>{
    const wrap=document.createElement('div'); wrap.className='nav-section';
    const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=sec.label; wrap.appendChild(lbl);
    let shown=0;
    sec.items.forEach(it=>{
      if(f && !it.label.toLowerCase().includes(f)) return;
      shown++;
      const el=document.createElement('div');
      el.className='nav-item'+(it.type==='tasks'?' task':'')+(sec.locked?' locked':'');
      const isActive = !sec.locked && ((it.type==='lesson'&&flat[cur].type==='lesson'&&flat[cur].i===it.i)||(it.type==='tasks'&&flat[cur].type==='tasks'));
      if(isActive) el.classList.add('active');
      let inner = it.type==='tasks'
        ? '<span class="file-ic">📄</span>'+it.label+'<span class="count">'+it.count+'</span>'
        : '<span class="dot"></span>'+it.label;
      if(sec.locked) inner += '<span class="count" style="margin-left:auto">🔒</span>';
      el.innerHTML=inner;
      if(!sec.locked){
        el.onclick=()=>{
          cur = it.type==='tasks' ? flat.length-1 : it.i;
          tab='lesson'; render();
        };
      } else { el.title='Available in the full Part 1 build'; }
      wrap.appendChild(el);
    });
    if(shown>0) nav.appendChild(wrap);
  });
}

function render(){
  const item=flat[cur];
  const lessonView=document.getElementById('lesson-view');
  const ideView=document.getElementById('ide-view');

  if(item.type==='lesson'){
    const L=LESSONS[item.i];
    document.getElementById('crumb').textContent='8. Inheritance & OOP';
    document.getElementById('title').textContent=L.title;
    lessonView.innerHTML=L.html;
    document.getElementById('editor').value=L.starter;
    document.getElementById('tab-ide').style.display='';
  } else {
    document.getElementById('crumb').textContent='8. Inheritance & OOP';
    document.getElementById('title').textContent='Module 1 Tasks';
    lessonView.innerHTML=renderTasks();
    document.getElementById('editor').value='# Use this editor to solve any task above.\n# Type your code, then press Run code.\n\n';
    document.getElementById('tab-ide').style.display='';
  }

  // highlight static lesson code blocks
  lessonView.querySelectorAll('pre.code').forEach(pre=>{ pre.innerHTML='<code>'+highlight(pre.textContent)+'</code>'; });

  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  lessonView.style.display = tab==='lesson' ? 'block' : 'none';
  ideView.classList.toggle('show', tab==='ide');
  updateGutter();

  // arrows
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===flat.length-1;

  buildNav(document.getElementById('search').value);
  document.querySelector('.content-wrap').scrollTop=0;
}

function renderTasks(){
  let h='<p class="tasks-intro">Work through these in order — they start very simple and build up. Try each one in the <strong>Try it yourself</strong> tab before revealing the solution.</p>';
  TASKS.forEach((t,idx)=>{
    h+='<div class="task"><div class="task-head"><div class="task-num">'+(idx+1)+'</div><div class="task-text">'+t.p+'</div></div>'+
       '<details><summary><span class="chev">▸</span> Show solution</summary><div class="task-sol">'+
       '<pre class="code"><code>'+highlight(t.c)+'</code></pre><div class="sol-note">'+t.e+'</div></div></details></div>';
  });
  return h;
}

/* ════════════════════ EDITOR ════════════════════ */
function updateGutter(){
  const ed=document.getElementById('editor');
  const lines=ed.value.split('\n').length;
  let g=''; for(let i=1;i<=lines;i++) g+=i+'\n';
  document.getElementById('gutter').textContent=g.trim();
}
const editor=document.getElementById('editor');
editor.addEventListener('input',updateGutter);
editor.addEventListener('scroll',()=>{document.getElementById('gutter').scrollTop=editor.scrollTop;});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateGutter();
  }
});

/* ════════════════════ RUN (Skulpt) ════════════════════ */
function runCode(){
  const out=document.getElementById('output');
  if(typeof Sk==='undefined'){
    out.innerHTML='<span class="out-hint">▸ The Python engine is still loading. Give it a moment and try again.</span>';
    return;
  }
  const code=document.getElementById('editor').value;
  out.innerHTML=''; let buf='';
  const write=t=>{buf+=t; out.innerHTML='<span class="out-ok">'+esc(buf)+'</span>'; out.scrollTop=out.scrollHeight;};
  const readf=x=>{ if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined) throw "File not found: '"+x+"'"; return Sk.builtinFiles["files"][x]; };
  Sk.configure({output:write, read:readf, __future__:Sk.python3, execLimit:10000});
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{ if(!buf) out.innerHTML='<span class="out-hint">▸ Program finished with no output.</span>'; },
          err=>{ out.innerHTML='<span class="out-err">'+esc(err.toString())+'</span>'; });
}
document.getElementById('run').onclick=runCode;
document.getElementById('reset').onclick=()=>{
  const item=flat[cur];
  document.getElementById('editor').value = item.type==='lesson' ? LESSONS[item.i].starter : '# Use this editor to solve any task above.\n\n';
  document.getElementById('output').innerHTML='<span class="out-hint">▸ Code reset.</span>';
  updateGutter();
};
